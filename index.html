<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Franca SP - IA de Alertas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
  body { margin:0; background:#111; color:white; font-family:Arial; }
  #map { height:100vh; }
</style>
</head>
<body>

<h2 style="padding:10px">Monitoramento Franca SP - Alertas IA</h2>
<div id="map"></div>

<script>
// === MAPA ===
var map = L.map('map').setView([-20.539,-47.401],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Camadas
var camadaAeronaves = L.layerGroup().addTo(map);
var camadaAlertas = L.layerGroup().addTo(map);

// === DETECTAR AERONAVES MILITARES ===
var aeronaves = [];
function detectarMilitares(){
  fetch("https://opensky-network.org/api/states/all")
    .then(r=>r.json())
    .then(d=>{
      camadaAeronaves.clearLayers();
      aeronaves = [];
      d.states.forEach(a=>{
        let lat=a[6], lon=a[5], callsign=a[1]||"";
        if(lat && lon && callsign.toUpperCase().includes("MIL")){
          aeronaves.push({lat, lon, callsign, alt:a[7]});
          L.circleMarker([lat,lon], {radius:5, color:"red"})
            .addTo(camadaAeronaves)
            .bindPopup(`MIL: ${callsign}<br>Alt: ${a[7]} m`);
        }
      });
    })
    .catch(()=>{ console.log("Erro API OpenSky"); });
}

// === IAs ANALISANDO E GERANDO ALERTAS ===
function atualizarAlertas(){
  camadaAlertas.clearLayers();

  for(let i=1;i<=120;i++){
    // IA “analisa” aeronaves e decide se gera alerta
    aeronaves.forEach(a=>{
      let lat = a.lat + (Math.random()-0.5)*0.001; // leve variação
      let lon = a.lon + (Math.random()-0.5)*0.001;

      let cor="green";
      let status="normal";

      // Regras de detecção suspeita
      if(a.alt < 3000){ cor="red"; status="⚠️ baixa altitude"; }
      else if(a.alt < 6000 && Math.random()>0.7){ cor="orange"; status="suspeita média"; }

      if(cor !== "green"){
        L.circleMarker([lat,lon], {radius:6, color:cor})
          .addTo(camadaAlertas)
          .bindPopup(`IA ${i} detectou: ${status}<br>Aeronave: ${a.callsign}`);
      }
    });
  }
}

// Atualização periódica
detectarMilitares();
atualizarAlertas();
setInterval(detectarMilitares,20000);
setInterval(atualizarAlertas,5000);

</script>
</body>
</html>
