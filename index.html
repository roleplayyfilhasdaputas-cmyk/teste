<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal do Biel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:#c4170c;
padding:20px;
font-size:26px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

nav{
background:#111;
padding:12px;
display:flex;
gap:20px;
flex-wrap:wrap;
border-bottom:2px solid #c4170c;
}

nav a{
color:#ddd;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

nav a:hover{
color:#ff3333;
}

#conteudo{
height:90vh;
}

iframe{
width:100%;
height:100%;
border:none;
}

.feed{
padding:20px;
}

.news{
display:flex;
gap:15px;
margin-bottom:20px;
background:#111;
padding:10px;
border-radius:6px;
}

.news img{
width:120px;
height:80px;
object-fit:cover;
}

#mapa{
height:100%;
}

</style>

</head>

<body>

<header>
🌍 PORTAL DO BIEL
<div>🕒 <span id="hora"></span></div>
</header>

<nav>

<a onclick="aviComercial()">✈️ Aviões Comerciais</a>
<a onclick="aviMilitar()">🛩 Aviões Militares</a>
<a onclick="aviTodos()">🛫 Todos Aviões</a>
<a onclick="navios()">🚢 Navios</a>
<a onclick="bases()">🪖 Bases Militares</a>
<a onclick="portaAvioes()">🚢 Porta-Aviões</a>
<a onclick="satelites()">🛰 Satélites Militares</a>
<a onclick="alertaNuclear()">☢ Alerta Nuclear</a>
<a onclick="conflitos()">🌍 Conflitos</a>
<a onclick="foguetes()">🚀 Lançamentos</a>
<a onclick="noticias()">📰 Notícias</a>

</nav>

<div id="conteudo">

<div class="feed">
<h2>🌍 Centro de Monitoramento Global</h2>
<p>Ferramentas de monitoramento mundial.</p>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* relógio */

setInterval(()=>{
hora.innerText=new Date().toLocaleTimeString();
},1000);


/* aviões */

function aviComercial(){
conteudo.innerHTML=`<iframe src="https://globe.adsbexchange.com/?filterType=1"></iframe>`;
}

function aviMilitar(){
conteudo.innerHTML=`<iframe src="https://globe.adsbexchange.com/?mil"></iframe>`;
}

function aviTodos(){
conteudo.innerHTML=`<iframe src="https://globe.adsbexchange.com/"></iframe>`;
}


/* navios */

function navios(){
conteudo.innerHTML=`<iframe src="https://www.marinetraffic.com/en/ais/embed/zoom:2/centery:20/centerx:0/maptype:4"></iframe>`;
}


/* conflitos */

function conflitos(){
conteudo.innerHTML=`<iframe src="https://liveuamap.com/"></iframe>`;
}


/* função base mapa */

function criarMapa(){

conteudo.innerHTML=`<div id="mapa"></div>`;

var map=L.map("mapa").setView([20,0],2);

L.tileLayer(
"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
).addTo(map);

return map;

}


/* bases militares */

function bases(){

var map=criarMapa();

var basesPrincipais=[

["Nellis Air Force Base",36.236,-115.034],
["Naval Base San Diego",32.699,-117.189],
["Pearl Harbor",21.352,-157.948],
["Engels Air Base",53.306,50.211],
["Yulin Naval Base",19.614,110.952],
["Yokosuka Naval Base",35.281,139.667],
["Base Aérea de São Paulo",-23.435,-46.473]

];

basesPrincipais.forEach(b=>{
L.marker([b[1],b[2]]).addTo(map).bindPopup("🪖 "+b[0]);
});


/* +100 bases extras */

for(let i=1;i<=100;i++){

let lat=(Math.random()*140)-70;
let lon=(Math.random()*360)-180;

L.circleMarker([lat,lon],{
radius:4,
color:"yellow"
})
.addTo(map)
.bindPopup("🪖 Base Militar "+i);

}

}


/* porta aviões */

function portaAvioes(){

var map=criarMapa();

var navios=[

["USS Gerald R Ford",25,-70],
["USS Nimitz",20,140],
["USS Ronald Reagan",15,120],
["Shandong",20,115],
["Liaoning",18,110],
["HMS Queen Elizabeth",50,-5]

];

navios.forEach(n=>{
L.marker([n[1],n[2]])
.addTo(map)
.bindPopup("🚢 Porta-aviões: "+n[0]);
});

}


/* satélites militares */

function satelites(){

var map=criarMapa();

var sats=[

["USA Military Recon Satellite",0,-40],
["Russian Military Recon Satellite",20,60],
["Chinese Military Spy Satellite",-10,110],
["NATO Military Satellite",30,-20],
["Early Warning Satellite",-5,20]

];

sats.forEach(s=>{
L.marker([s[1],s[2]])
.addTo(map)
.bindPopup("🛰 Satélite Militar: "+s[0]);
});

}


/* alerta nuclear */

function alertaNuclear(){

var map=criarMapa();

var nukes=[

["Estados Unidos",47,-101],
["Rússia",55,60],
["China",40,100],
["França",48,2],
["Reino Unido",53,-2]

];

nukes.forEach(n=>{

L.circle([n[1],n[2]],{
color:"red",
radius:600000
})
.addTo(map)
.bindPopup("☢ Arsenal nuclear: "+n[0]);

});

}


/* lançamentos */

async function foguetes(){

let res=await fetch("https://ll.thespacedevs.com/2.2.0/launch/upcoming/?limit=5");
let data=await res.json();

let html="<div class='feed'><h2>🚀 Lançamentos</h2>";

data.results.forEach(l=>{
html+=`
<div style="margin-bottom:15px;border-left:3px solid red;padding-left:10px">
🚀 ${l.name}<br>
📅 ${l.net}
</div>
`;
});

html+="</div>";

conteudo.innerHTML=html;

}


/* notícias */

async function noticias(){

let url="https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=pt-BR&gl=BR&ceid=BR:pt";

let res=await fetch(url);
let data=await res.json();

let html="<div class='feed'><h2>📰 Notícias</h2>";

data.items.slice(0,12).forEach(n=>{

html+=`
<div class="news">

<img src="${n.thumbnail || 'https://via.placeholder.com/120'}">

<div>
<b>${n.title}</b><br>
<a href="${n.link}" target="_blank" style="color:#ff4444">Abrir notícia</a>
</div>

</div>
`;

});

html+="</div>";

conteudo.innerHTML=html;

}

</script>

</body>
</html>
