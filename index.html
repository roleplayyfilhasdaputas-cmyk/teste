<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal do Biel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:#c4170c;
padding:20px;
font-size:26px;
font-weight:bold;
}

nav{
background:#111;
padding:12px;
display:flex;
gap:18px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

nav a:hover{
color:#ff4444;
}

#conteudo{
height:90vh;
}

iframe{
width:100%;
height:100%;
border:none;
}

.feed{
padding:20px;
}

.news{
display:flex;
gap:10px;
margin-bottom:15px;
border-left:3px solid red;
padding-left:10px;
}

.news img{
width:120px;
height:80px;
object-fit:cover;
}

#mapaBases{
height:100%;
}

</style>

</head>

<body>

<header>
🌍 PORTAL DO BIEL
</header>

<nav>

<a onclick="aviComercial()">✈️ Aviões Comerciais</a>

<a onclick="aviMilitar()">🛩 Aviões Militares</a>

<a onclick="aviTodos()">🛫 Todos Aviões</a>

<a onclick="navios()">🚢 Navios / Porta-aviões</a>

<a onclick="bases()">🪖 Bases Militares</a>

<a onclick="conflitos()">🌍 Conflitos</a>

<a onclick="foguetes()">🚀 Lançamentos</a>

<a onclick="noticias()">📰 Notícias</a>

</nav>

<div id="conteudo">

<div class="feed">
<h2>Painel Global</h2>
<p>Escolha uma ferramenta acima.</p>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

function aviComercial(){
conteudo.innerHTML =
`<iframe src="https://globe.adsbexchange.com/?filterType=1"></iframe>`;
}

function aviMilitar(){
conteudo.innerHTML =
`<iframe src="https://globe.adsbexchange.com/?mil"></iframe>`;
}

function aviTodos(){
conteudo.innerHTML =
`<iframe src="https://globe.adsbexchange.com/"></iframe>`;
}

function navios(){
conteudo.innerHTML =
`<iframe src="https://www.marinetraffic.com/en/ais/embed/zoom:2/centery:20/centerx:0/maptype:4/shownames:true/shiptypes:8"></iframe>`;
}

function conflitos(){
conteudo.innerHTML =
`<iframe src="https://liveuamap.com/"></iframe>`;
}

function bases(){

conteudo.innerHTML = `<div id="mapaBases"></div>`;

setTimeout(()=>{

var map = L.map('mapaBases').setView([30,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

L.marker([36.0,-115.0]).addTo(map)
.bindPopup("🇺🇸 Base Nellis (EUA)");

L.marker([34.7,33.0]).addTo(map)
.bindPopup("🇬🇧 Base Akrotiri (Reino Unido)");

L.marker([35.4,139.4]).addTo(map)
.bindPopup("🇯🇵 Base Yokosuka (Japão)");

L.marker([25.2,55.3]).addTo(map)
.bindPopup("🇺🇸 Base Al Dhafra (EAU)");

L.marker([52.3,13.5]).addTo(map)
.bindPopup("🇩🇪 Base OTAN Alemanha");

},100);

}

async function foguetes(){

let res = await fetch("https://ll.thespacedevs.com/2.2.0/launch/upcoming/?limit=5");

let data = await res.json();

let html="<div class='feed'><h2>🚀 Lançamentos Espaciais</h2>";

data.results.forEach(l => {

html += `
<div style="margin-bottom:15px;border-left:3px solid red;padding-left:10px">
🚀 ${l.name}<br>
📅 ${l.net}
</div>
`;

});

html += "</div>";

conteudo.innerHTML = html;

}

async function noticias(){

let url="https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=pt-BR&gl=BR&ceid=BR:pt";

let res=await fetch(url);
let data=await res.json();

let html="<div class='feed'><h2>📰 Notícias</h2>";

data.items.slice(0,12).forEach(n=>{

html+=`
<div class="news">

<img src="${n.thumbnail || 'https://via.placeholder.com/120'}">

<div>
<b>${n.title}</b><br>
<a href="${n.link}" target="_blank" style="color:#ff4444">Abrir notícia</a>
</div>

</div>
`;

});

html+="</div>";

conteudo.innerHTML=html;

}

</script>

</body>
</html>
