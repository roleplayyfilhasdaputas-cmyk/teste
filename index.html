<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Radar de Ocorrências Franca</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

#map{
height:75vh;
}

#painel{
height:25vh;
background:#222;
overflow:auto;
padding:10px;
}

</style>
</head>

<body>

<h2 style="padding:10px">Radar de Ocorrências - Franca</h2>

<div id="map"></div>

<div id="painel">

<h3>Ocorrências últimas 24h</h3>
<div id="timeline"></div>

</div>

<script>

const map = L.map('map').setView([-20.538,-47.401],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map)

const feeds = [

"https://g1.globo.com/rss/sp/franca-jacarei/index.xml",
"https://acidadeon.com/franca/rss"

]

function tipoCrime(t){

t=t.toLowerCase()

if(t.includes("acidente")) return "yellow"
if(t.includes("roubo")) return "red"
if(t.includes("assalto")) return "red"
if(t.includes("homicídio")) return "black"
if(t.includes("assassinato")) return "black"

return null

}

async function rss(){

const proxy="https://api.allorigins.win/get?url="

let lista=[]
let agora=new Date()

for(let f of feeds){

try{

let r=await fetch(proxy+encodeURIComponent(f))
let j=await r.json()

let xml=new DOMParser().parseFromString(j.contents,"text/xml")

let items=xml.querySelectorAll("item")

items.forEach(i=>{

let titulo=i.querySelector("title").textContent
let data=new Date(i.querySelector("pubDate").textContent)

let horas=(agora-data)/(1000*60*60)

if(horas<=24){

lista.push({
titulo:titulo,
data:data
})

}

})

}catch(e){}

}

return lista

}

async function atualizar(){

document.getElementById("timeline").innerHTML=""

let noticias=await rss()

for(let n of noticias){

let tipo=tipoCrime(n.titulo)

if(!tipo) continue

let lat=-20.538 + (Math.random()*0.05)
let lon=-47.401 + (Math.random()*0.05)

let marker=L.circleMarker(

[lat,lon],
{
radius:8,
color:tipo,
fillColor:tipo,
fillOpacity:0.9
}

).addTo(map)

let hora=n.data.toLocaleString("pt-BR")

marker.bindPopup(

"<b>"+n.titulo+"</b><br>"+hora

)

document.getElementById("timeline").innerHTML+=

hora+" - "+n.titulo+"<br>"

}

}

setInterval(atualizar,5000)

atualizar()

</script>

</body>
</html>
