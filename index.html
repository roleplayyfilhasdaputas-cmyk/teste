<!DOCTYPE html> <html lang="pt-BR"> <head> <meta charset="UTF-8"> <title>Radar IA Helicópteros</title> <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/> <style> body{ margin:0; font-family:Arial; background:#00110a; color:#00ff9c; } #topbar{ background:#001b12; padding:12px; font-size:18px; font-weight:bold; } #container{ display:flex; height:calc(100vh - 48px); } #map{ flex:3; height:100%; } #painel{ flex:1; background:#00110a; padding:15px; overflow:auto; border-left:2px solid #003d2a; } .alerta{ background:#00ff9c; color:black; padding:10px; margin-bottom:10px; display:none; font-weight:bold; } .card{ background:#002417; padding:10px; margin-bottom:10px; border-radius:6px; } </style> </head> <body> <div id="topbar"> 🟢 Radar IA Helicópteros </div> <div id="container"> <div id="map"></div> <div id="painel"> <div id="alerta" class="alerta"> 🚁 Helicóptero patrulhando detectado </div> <h3>Radar</h3> <div id="lista"></div> </div> </div> <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> <script> var centro = {lat:-20.5386,lon:-47.4000}; var raio = 6; var map = L.map('map').setView([centro.lat,centro.lon],12); L.tileLayer( 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19}).addTo(map); L.circle([centro.lat,centro.lon],{ radius:raio*1000, color:"#00ff9c", fill:false }).addTo(map); var trilhas = {}; var historico = {}; function distancia(lat1,lon1,lat2,lon2){ var R=6371; var dLat=(lat2-lat1)*Math.PI/180; var dLon=(lon2-lon1)*Math.PI/180; var a= Math.sin(dLat/2)*Math.sin(dLat/2)+ Math.cos(lat1*Math.PI/180)* Math.cos(lat2*Math.PI/180)* Math.sin(dLon/2)*Math.sin(dLon/2); var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); return R*c; } // heurística IA function analisarPadrao(id,vel,alt,lat,lon){ if(!historico[id]) historico[id]=[]; historico[id].push([lat,lon]); if(historico[id].length > 10) historico[id].shift(); if(vel < 120 && alt < 2500){ // hover if(vel < 10) return "hover"; // patrulha circular if(historico[id].length > 6){ var distTotal = 0; for(let i=1;i<historico[id].length;i++){ distTotal += distancia( historico[id][i-1][0], historico[id][i-1][1], historico[id][i][0], historico[id][i][1] ); } if(distTotal < 2) return "patrulha"; } return "helicoptero"; } return "aviao"; } function tocarAlarme(){ var ctx = new AudioContext(); var osc = ctx.createOscillator(); osc.type="sine"; osc.frequency.value=800; osc.connect(ctx.destination); osc.start(); setTimeout(()=>{ osc.stop(); },300); } async function radar(){ let r = await fetch("https://opensky-network.org/api/states/all"); let data = await r.json(); document.getElementById("lista").innerHTML=""; document.getElementById("alerta").style.display="none"; data.states.forEach(a=>{ let id=a[0]; let callsign=a[1]; let lon=a[5]; let lat=a[6]; let alt=a[7]; let vel=a[9]; if(!lat || !lon) return; let dist = distancia(centro.lat,centro.lon,lat,lon); if(dist < raio){ let tipo = analisarPadrao(id,vel,alt,lat,lon); L.marker([lat,lon]).addTo(map) .bindPopup(callsign); if(!trilhas[id]) trilhas[id]=[]; trilhas[id].push([lat,lon]); L.polyline(trilhas[id],{color:"#00ff9c"}).addTo(map); if(tipo === "patrulha"){ document.getElementById("alerta").style.display="block"; tocarAlarme(); } let card = ` <div class="card"> <b>${callsign}</b><br> Tipo IA: ${tipo}<br> Altitude: ${alt}<br> Velocidade: ${vel} </div> `; document.getElementById("lista").innerHTML+=card; } }); } radar(); setInterval(radar,20000); </script> </body> </html>
