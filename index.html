<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal do Biel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:#c4170c;
padding:20px;
font-size:26px;
font-weight:bold;
}

nav{
background:#111;
padding:12px;
display:flex;
gap:20px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

nav a:hover{
color:#ff4444;
}

#conteudo{
height:90vh;
}

iframe{
width:100%;
height:100%;
border:none;
}

.feed{
padding:20px;
}

.item{
margin-bottom:15px;
border-left:3px solid red;
padding-left:10px;
}

#mapaNuclear{
height:100%;
}

</style>

</head>

<body>

<header>
🌍 PORTAL DO BIEL
</header>

<nav>

<a onclick="radar()">✈️ Aviões</a>

<a onclick="militares()">🛩 Aviões Militares</a>

<a onclick="navios()">🚢 Navios</a>

<a onclick="sat()">🛰 ISS</a>

<a onclick="explosoes()">☢ Alertas Satélite</a>

<a onclick="nuclear()">☢ Bombas Atômicas</a>

<a onclick="conflitos()">🌍 Conflitos</a>

<a onclick="foguetes()">🚀 Lançamentos</a>

<a onclick="noticias()">📰 Notícias</a>

</nav>

<div id="conteudo">

<div class="feed">
<h2>Painel Global</h2>
<p>Escolha uma ferramenta acima.</p>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

function radar(){
document.getElementById("conteudo").innerHTML=
`<iframe src="https://globe.adsbexchange.com/"></iframe>`;
}

function militares(){
document.getElementById("conteudo").innerHTML=
`<iframe src="https://globe.adsbexchange.com/?mil"></iframe>`;
}

function navios(){
document.getElementById("conteudo").innerHTML=
`<iframe src="https://www.marinetraffic.com/en/ais/embed/zoom:2/centery:20/centerx:0/maptype:4/shownames:true/shiptypes:8"></iframe>`;
}

function sat(){
document.getElementById("conteudo").innerHTML=
`<iframe src="https://isstracker.spaceflight.esa.int/"></iframe>`;
}

function explosoes(){
document.getElementById("conteudo").innerHTML=
`<iframe src="https://firms.modaps.eosdis.nasa.gov/map/#d:24hrs;@0.0,0.0,2z"></iframe>`;
}

function nuclear(){

document.getElementById("conteudo").innerHTML=`<div id="mapaNuclear"></div>`;

setTimeout(()=>{

var map = L.map('mapaNuclear').setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'Mapa'
}).addTo(map);

L.marker([38.9,-77]).addTo(map)
.bindPopup("☢ Washington (simulação)");

L.marker([55.7,37.6]).addTo(map)
.bindPopup("☢ Moscou (simulação)");

L.marker([39.9,116.4]).addTo(map)
.bindPopup("☢ Pequim (simulação)");

L.marker([35.6,139.7]).addTo(map)
.bindPopup("☢ Tóquio (simulação)");

L.marker([48.8,2.3]).addTo(map)
.bindPopup("☢ Paris (simulação)");

L.marker([-23.55,-46.63]).addTo(map)
.bindPopup("☢ São Paulo (simulação)");

},100);

}

function conflitos(){
document.getElementById("conteudo").innerHTML=
`<iframe src="https://liveuamap.com/"></iframe>`;
}

async function foguetes(){

let res = await fetch("https://ll.thespacedevs.com/2.2.0/launch/upcoming/?limit=5");
let data = await res.json();

let html="<div class='feed'><h2>🚀 Lançamentos Espaciais</h2>";

data.results.forEach(l => {

html+=`
<div class="item">
🚀 ${l.name}<br>
📅 ${l.net}
</div>
`;

});

html+="</div>";

document.getElementById("conteudo").innerHTML=html;

}

async function noticias(){

let url="https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=pt-BR&gl=BR&ceid=BR:pt";

let res=await fetch(url);
let data=await res.json();

let html="<div class='feed'><h2>📰 Notícias</h2>";

data.items.slice(0,15).forEach(n => {

html+=`
<div class="item">
<b>${n.title}</b><br>
<a href="${n.link}" target="_blank" style="color:#ff4444">Abrir notícia</a>
</div>
`;

});

html+="</div>";

document.getElementById("conteudo").innerHTML=html;

}

</script>

</body>
</html>
