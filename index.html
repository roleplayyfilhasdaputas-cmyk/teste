<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Radar IA Helicópteros - Franca</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}
#topbar{
  background:#111827;
  padding:12px;
  font-size:18px;
  font-weight:bold;
}
#container{
  display:flex;
  height:calc(100vh - 48px);
}
#map{
  flex:3;
  height:100%;
}
#painel{
  flex:1;
  background:#020617;
  padding:15px;
  overflow:auto;
  border-left:2px solid #1f2937;
}
.alerta{
  background:#ff0000;
  padding:10px;
  margin-bottom:10px;
  display:none;
  font-weight:bold;
  text-align:center;
}
.card{
  background:#1f2937;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
}
#contador{
  margin-bottom:10px;
  font-weight:bold;
  text-align:center;
  color:#ff5555;
}
</style>
</head>
<body>
<div id="topbar">
🚁 Radar IA Helicópteros — Franca
</div>
<div id="container">
<div id="map"></div>
<div id="painel">
<div id="alerta" class="alerta">
⚠ Possível helicóptero detectado
</div>
<div id="contador">Helicópteros ativos: 0</div>
<h3>Detecções</h3>
<div id="lista"></div>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var centro = {lat:-20.5386, lon:-47.4000};
var raio = 5;

var map = L.map('map').setView([centro.lat,centro.lon],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

// círculo central
L.circle([centro.lat,centro.lon],{radius:raio*1000,color:"red",fill:false}).addTo(map);

var trilhas = {};
var markers = {};
var bases = {};
var estacionados = {};
var iconeBase = L.icon({
  iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
  iconSize: [30,30]
});

// carrega bases
if(localStorage.getItem("bases")){
  bases = JSON.parse(localStorage.getItem("bases"));
}

// função distância
function distancia(lat1,lon1,lat2,lon2){
  var R=6371;
  var dLat=(lat2-lat1)*Math.PI/180;
  var dLon=(lon2-lon1)*Math.PI/180;
  var a= Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return R*c;
}

// detectar helicóptero
function detectarHelicoptero(vel,alt){
  if(!vel) return false;
  if(vel < 120 && alt < 3000) return true;
  return false;
}

// limpar marcadores
function limparMarcadores(){
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers = {};
}

// adicionar base/pouso com agrupamento
function adicionarBase(lat,lon){
  let key = lat.toFixed(3)+"_"+lon.toFixed(3); // arredonda para agrupar próximos
  let agora = Date.now();
  let vinteDias = 20*24*60*60*1000;
  if(!bases[key]){
    bases[key] = {lat:lat,lon:lon,timestamp:agora,count:1};
  } else {
    bases[key].count++;
    bases[key].timestamp = agora;
  }
  localStorage.setItem("bases",JSON.stringify(bases));
}

// desenhar bases
function desenharBases(){
  let agora = Date.now();
  Object.keys(bases).forEach(key=>{
    if((agora - bases[key].timestamp) <= 20*24*60*60*1000){
      L.marker([bases[key].lat,bases[key].lon], {icon: iconeBase})
        .bindPopup(`BASE / Pouso (20 dias) - ${bases[key].count} pouso(s)`)
        .addTo(map);
    }
  });
}

// radar principal
async function radar(){
  limparMarcadores();
  let r = await fetch("https://opensky-network.org/api/states/all");
  let data = await r.json();

  document.getElementById("lista").innerHTML="";
  document.getElementById("alerta").style.display="none";

  let countAtivos = 0;

  data.states.forEach(a=>{
    let id = a[0];
    let callsign = a[1];
    let lon = a[5];
    let lat = a[6];
    let alt = a[7];
    let vel = a[9];
    if(!lat || !lon) return;

    let dist = distancia(centro.lat, centro.lon, lat, lon);
    if(dist < raio){
      let helicoptero = detectarHelicoptero(vel,alt);
      if(!helicoptero) return;

      countAtivos++;

      // marcador voo
      let marker = L.marker([lat,lon]).addTo(map).bindPopup(callsign);
      markers[id] = marker;

      // trilha
      if(!trilhas[id]) trilhas[id]=[];
      trilhas[id].push([lat,lon]);
      L.polyline(trilhas[id],{color:"red"}).addTo(map);

      // alerta
      document.getElementById("alerta").style.display="block";

      // painel lateral
      let card = `<div class="card">
        <b>${callsign}</b><br>
        Tipo: 🚁 helicóptero<br>
        Altitude: ${alt}<br>
        Velocidade: ${vel}
      </div>`;
      document.getElementById("lista").innerHTML+=card;

      // detectar pouso
      if(vel < 5){
        if(!estacionados[id]) estacionados[id] = 1;
        else estacionados[id]++;
        if(estacionados[id] >= 3){
          adicionarBase(lat,lon);
        }
      } else {
        estacionados[id] = 0;
      }
    }
  });

  // atualizar contador
  document.getElementById("contador").innerText = `Helicópteros ativos: ${countAtivos}`;

  // desenhar bases
  desenharBases();
}

// primeira execução
radar();
setInterval(radar,20000);
</script>
</body>
</html>
