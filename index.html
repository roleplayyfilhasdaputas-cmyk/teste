<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Centro de Comando Global</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
background:#04080c;
color:white;
font-family:Arial;
}

header{
background:#0f1419;
padding:15px;
font-size:24px;
border-bottom:2px solid red;
}

#map{
height:90vh;
}

.painel{
position:absolute;
top:80px;
left:10px;
background:#111;
padding:15px;
width:250px;
border:1px solid red;
}

.alerta{
color:red;
font-weight:bold;
animation:piscando 1s infinite;
}

@keyframes piscando{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

.sistema{
margin-top:15px;
background:#000;
padding:10px;
border:1px solid lime;
font-size:14px;
}

.radar{
position:absolute;
bottom:20px;
right:20px;
width:120px;
height:120px;
border:2px solid lime;
border-radius:50%;
}

.radar::after{
content:"";
position:absolute;
width:2px;
height:60px;
background:lime;
top:0;
left:50%;
transform-origin:bottom;
animation:radar 2s linear infinite;
}

@keyframes radar{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

</style>
</head>

<body>

<header>
🌍 CENTRO DE COMANDO GLOBAL
</header>

<div id="map"></div>

<div class="painel">

<h3>🔴 Conflitos</h3>

<div class="alerta">Ucrânia</div>
<div class="alerta">Gaza</div>
<div class="alerta">Síria</div>
<div class="alerta">Mar da China</div>

<div class="sistema">

<b>Sistema B - Análise</b>

<div id="analise">

Iniciando sistema...

</div>

</div>

</div>

<div class="radar"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:6
}).addTo(map);

function add(lista,cor){

lista.forEach(function(b){

L.circleMarker([b[0],b[1]],{
color:cor,
radius:7
}).addTo(map).bindPopup(b[2]);

});

}



// bases aéreas

add([
[38.87,-77.06,"✈ Base EUA"],
[51.47,-0.45,"✈ Base UK"],
[35.55,139.78,"✈ Base Japão"]
],"cyan");



// bases navais

add([
[36.97,-76.33,"⚓ Base Naval EUA"],
[31.23,121.47,"⚓ Base Naval China"]
],"blue");



// nucleares

add([
[40.18,44.51,"☢ Base Nuclear Rússia"],
[31.90,35.20,"☢ Base Nuclear Israel"]
],"yellow");



// porta aviões

add([
[20,-150,"🚢 Porta Aviões EUA"],
[10,60,"🚢 Porta Aviões Índia"]
],"purple");



// submarinos

add([
[-10,-40,"🤿 Submarino Nuclear"],
[5,80,"🤿 Submarino Rússia"]
],"orange");



// conflitos

add([
[49,31,"🔴 Guerra Ucrânia"],
[31,34,"🔴 Gaza"],
[35,38,"🔴 Síria"],
[15,115,"🔴 Mar da China"]
],"red");



// SISTEMA B

var conflitos = [
"Ucrânia",
"Gaza",
"Síria",
"Mar da China"
];

function sistemaB(){

var risco = ["BAIXO","MÉDIO","ALTO","CRÍTICO"];

var conflito = conflitos[Math.floor(Math.random()*conflitos.length)];

var nivel = risco[Math.floor(Math.random()*risco.length)];

document.getElementById("analise").innerHTML =
"Conflito analisado: "+conflito+"<br>"+
"Nível de risco: "+nivel+"<br>"+
"Atualização: "+new Date().toLocaleTimeString();

}

setInterval(sistemaB,4000);

</script>

</body>
</html>
