<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Investigativo de Gastos Públicos</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#c40000;
padding:20px;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
}

.search{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
padding:10px;
border-radius:6px;
border:none;
width:260px;
}

button{
background:#c40000;
border:none;
color:white;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#141414;
padding:20px;
border-radius:10px;
}

canvas{
background:#0f0f0f;
border-radius:10px;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
text-align:left;
}

th{
color:#ccc;
}

</style>
</head>

<body>

<header>Painel Investigativo de Gastos Públicos</header>

<div class="container">

<div class="search">

<input id="search" placeholder="Buscar deputado">

<button onclick="buscarDeputado()">Buscar</button>

<button onclick="exportCSV()">Exportar CSV</button>

</div>

<div id="count"></div>

<div class="grid">

<div class="card">
<h3>Ranking de gastos</h3>
<ul id="ranking"></ul>
</div>

<div class="card">
<h3>Pagamentos altos detectados</h3>
<ul id="altos"></ul>
</div>

<div class="card">
<h3>Distribuição de despesas</h3>
<canvas id="graficoDespesa"></canvas>
</div>

<div class="card">
<h3>Top gastos</h3>
<canvas id="graficoValores"></canvas>
</div>

</div>

<div class="card" style="margin-top:20px">

<h3>Despesas</h3>

<table id="tabela">

<thead>
<tr>
<th>Deputado</th>
<th>Tipo</th>
<th>Valor</th>
<th>Fornecedor</th>
<th>Data</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

let dados=[]

async function buscarDeputado(){

let nome=document.getElementById("search").value

let res=await fetch("https://dadosabertos.camara.leg.br/api/v2/deputados?nome="+nome)

let json=await res.json()

if(!json.dados.length){
alert("Deputado não encontrado")
return
}

let id=json.dados[0].id

buscarDespesas(id,json.dados[0].nome)

}

async function buscarDespesas(id,nome){

let res=await fetch("https://dadosabertos.camara.leg.br/api/v2/deputados/"+id+"/despesas?itens=100")

let json=await res.json()

dados=json.dados.map(d=>({

deputado:nome,
tipo:d.tipoDespesa,
valor:d.valorLiquido,
fornecedor:d.nomeFornecedor,
data:d.dataDocumento

}))

renderTabela()
ranking()
pagamentosAltos()
graficoDespesas()
graficoValores()

}

function renderTabela(){

let tbody=document.querySelector("#tabela tbody")

tbody.innerHTML=""

dados.forEach(d=>{

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${d.deputado}</td>
<td>${d.tipo}</td>
<td>R$ ${d.valor}</td>
<td>${d.fornecedor}</td>
<td>${d.data}</td>

`

tbody.appendChild(tr)

})

document.getElementById("count").innerText=dados.length+" registros carregados"

}

function ranking(){

let mapa={}

dados.forEach(d=>{
mapa[d.tipo]=(mapa[d.tipo]||0)+d.valor
})

let lista=Object.entries(mapa).sort((a,b)=>b[1]-a[1])

let ul=document.getElementById("ranking")

ul.innerHTML=""

lista.forEach(r=>{

let li=document.createElement("li")

li.innerText=r[0]+" - R$ "+Math.round(r[1])

ul.appendChild(li)

})

}

function pagamentosAltos(){

let ul=document.getElementById("altos")

ul.innerHTML=""

dados.filter(d=>d.valor>10000).forEach(d=>{

let li=document.createElement("li")

li.innerText=d.tipo+" - R$ "+d.valor

ul.appendChild(li)

})

}

function graficoDespesas(){

let mapa={}

dados.forEach(d=>{
mapa[d.tipo]=(mapa[d.tipo]||0)+d.valor
})

new Chart(document.getElementById("graficoDespesa"),{

type:"pie",

data:{
labels:Object.keys(mapa),

datasets:[{

data:Object.values(mapa)

}]

}

})

}

function graficoValores(){

let top=dados
.sort((a,b)=>b.valor-a.valor)
.slice(0,5)

new Chart(document.getElementById("graficoValores"),{

type:"bar",

data:{

labels:top.map(d=>d.tipo),

datasets:[{

label:"Valor",

data:top.map(d=>d.valor)

}]

}

})

}

function exportCSV(){

let csv="Deputado,Tipo,Valor,Fornecedor,Data\n"

dados.forEach(d=>{
csv+=`${d.deputado},${d.tipo},${d.valor},${d.fornecedor},${d.data}\n`
})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="gastos_deputado.csv"

a.click()

}

</script>

</body>
</html>
