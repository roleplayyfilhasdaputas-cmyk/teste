<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal do Biel</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:#c4170c;
padding:20px;
font-size:26px;
font-weight:bold;
}

nav{
background:#111;
padding:12px;
display:flex;
gap:20px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

nav a:hover{
color:#ff4444;
}

#conteudo{
height:90vh;
}

iframe{
width:100%;
height:100%;
border:none;
}

.feed{
padding:20px;
}

.item{
margin-bottom:15px;
border-left:3px solid red;
padding-left:10px;
}

.painel{
display:flex;
height:100%;
}

.lateral{
width:300px;
background:#111;
padding:15px;
overflow:auto;
}

.mapa{
flex:1;
}

</style>

</head>

<body>

<header>
🌍 PORTAL DO BIEL
</header>

<nav>

<a onclick="radar()">✈️ Aviões</a>

<a onclick="militares()">🛩 Aviões Militares</a>

<a onclick="naviosMilitares()">🚢 Navios Militares</a>

<a onclick="sat()">🛰 Satélites</a>

<a onclick="conflitos()">🌍 Conflitos</a>

<a onclick="foguetes()">🚀 Lançamentos</a>

<a onclick="noticias()">📰 Notícias</a>

</nav>

<div id="conteudo">

<div class="feed">
<h2>Painel Global</h2>
<p>Escolha uma ferramenta acima.</p>
</div>

</div>

<script>

function radar(){
document.getElementById("conteudo").innerHTML=
`<iframe src="https://globe.adsbexchange.com/"></iframe>`;
}

function militares(){
document.getElementById("conteudo").innerHTML=
`<iframe src="https://globe.adsbexchange.com/?mil"></iframe>`;
}

function naviosMilitares(){

document.getElementById("conteudo").innerHTML=`

<div class="painel">

<div class="lateral">

<h2>🚢 Radar Naval</h2>

<div class="item">🚢 Porta-aviões</div>
<div class="item">🚢 Destroyers</div>
<div class="item">🚢 Fragatas</div>
<div class="item">🚢 Submarinos</div>

<p style="color:#aaa">
Monitoramento global de embarcações.
</p>

</div>

<div class="mapa">

<iframe
src="https://www.marinetraffic.com/en/ais/embed/zoom:2/centery:20/centerx:0/maptype:4/shownames:true/shiptypes:8">
</iframe>

</div>

</div>

`;

}

function sat(){

document.getElementById("conteudo").innerHTML=`

<div class="painel">

<div class="lateral">

<h2>🛰 Monitoramento Espacial</h2>

<div class="item">🛰 Satélites de comunicação</div>

<div class="item">🛰 Satélites meteorológicos</div>

<div class="item">🛰 Satélites militares</div>

<div class="item">🛰 GPS / navegação</div>

<div class="item">🛰 Constelações orbitais</div>

<p style="color:#aaa">
Mapa global de satélites orbitando a Terra em tempo quase real.
</p>

</div>

<div class="mapa">

<iframe src="https://stuffin.space/"></iframe>

</div>

</div>

`;

}

function conflitos(){

document.getElementById("conteudo").innerHTML=
`<iframe src="https://liveuamap.com/"></iframe>`;

}

async function foguetes(){

let res = await fetch("https://ll.thespacedevs.com/2.2.0/launch/upcoming/?limit=5");

let data = await res.json();

let html="<div class='feed'><h2>🚀 Lançamentos Espaciais</h2>";

data.results.forEach(l => {

html += `
<div class="item">
🚀 ${l.name}<br>
📅 ${l.net}
</div>
`;

});

html+="</div>";

document.getElementById("conteudo").innerHTML=html;

}

async function noticias(){

let url="https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=pt-BR&gl=BR&ceid=BR:pt";

let res=await fetch(url);

let data=await res.json();

let html="<div class='feed'><h2>📰 Notícias Globais</h2>";

data.items.slice(0,15).forEach(n => {

html+=`
<div class="item">
<b>${n.title}</b><br>
<a href="${n.link}" target="_blank" style="color:#ff4444">Abrir notícia</a>
</div>
`;

});

html+="</div>";

document.getElementById("conteudo").innerHTML=html;

}

</script>

</body>
</html>
