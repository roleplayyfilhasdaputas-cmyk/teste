```html
<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Radar de Gastos dos Deputados</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:#c4170c;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:#161616;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
}

th{
background:#1f1f1f;
}

.valor-alto{
color:#ff4444;
font-weight:bold;
}

</style>

</head>

<body>

<header>
Radar de Gastos Públicos 🇧🇷
</header>

<div class="container">

<h2>Gastos recentes de deputados</h2>

<table>

<thead>

<tr>
<th>Deputado</th>
<th>Tipo de despesa</th>
<th>Valor</th>
<th>Data</th>
<th>Fornecedor</th>
</tr>

</thead>

<tbody id="tabela">

</tbody>

</table>

</div>

<script>

async function carregar(){

const url="https://dadosabertos.camara.leg.br/api/v2/despesas?itens=30&ordem=DESC&ordenarPor=dataDocumento"

const resposta=await fetch(url)

const json=await resposta.json()

const tabela=document.getElementById("tabela")

json.dados.forEach(d=>{

let classe=""

if(d.valorLiquido>5000){

classe="valor-alto"

}

const linha=document.createElement("tr")

linha.innerHTML=`

<td>${d.nomeDeputado}</td>
<td>${d.tipoDespesa}</td>
<td class="${classe}">R$ ${d.valorLiquido}</td>
<td>${d.dataDocumento}</td>
<td>${d.nomeFornecedor}</td>

`

tabela.appendChild(linha)

})

}

carregar()

</script>

</body>

</html>
```
