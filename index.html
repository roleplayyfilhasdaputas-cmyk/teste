<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Monitoramento Franca SP - Militar & IA</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
  body { margin:0; background:#111; color:white; font-family:Arial; }
  #map { height:75vh; }
  #painel { padding:10px; background:#222; max-height:25vh; overflow-y:auto; }
  .ia-status { margin:3px 0; }
</style>
</head>
<body>

<h2 style="padding:10px">Centro de Monitoramento - Franca SP</h2>

<div id="map"></div>
<div id="painel">
  <div>🌧️ Clima: <span id="clima">carregando...</span></div>
  <div>✈️ Aeronaves militares detectadas: <span id="military">0</span></div>
  <div>🤖 Análises IA (120):</div>
  <div id="ias"></div>
</div>

<script>
var map = L.map('map').setView([-20.539,-47.401],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.marker([-20.539,-47.401]).addTo(map).bindPopup("Franca SP");

// Layer para aeronaves
var camadaAeronaves = L.layerGroup().addTo(map);

// Clima
function atualizarClima(){
  fetch("https://api.openweathermap.org/data/2.5/weather?q=Franca,BR&appid=YOUR_API_KEY&units=metric")
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("clima").innerText = d.main.temp+"°C "+d.weather[0].description;
  }).catch(()=>{ document.getElementById("clima").innerText="erro"; });
}

// Aeronaves militares
function detectarMilitares(){
  fetch("https://opensky-network.org/api/states/all")
  .then(r=>r.json())
  .then(d=>{
    camadaAeronaves.clearLayers();
    let count = 0;
    d.states.forEach(a=>{
      let lat = a[6], lon = a[5], callsign = a[1] || "";
      if(lat && lon && callsign.toUpperCase().includes("MIL")){
        count++;
        L.circleMarker([lat,lon],{radius:5,color:"red"}).addTo(camadaAeronaves)
          .bindPopup("MIL: "+callsign);
      }
    });
    document.getElementById("military").innerText = count;
  }).catch(()=>{ document.getElementById("military").innerText="API bloqueada"; });
}

// IA Simulada (120 instâncias)
function atualizarIA(){
  let iasDiv = document.getElementById("ias");
  iasDiv.innerHTML = "";
  for(let i=1;i<=120;i++){
    let status = Math.random()<0.05 ? "⚠️ alerta" : "normal";
    let div = document.createElement("div");
    div.className="ia-status";
    div.innerText = `IA ${i}: ${status}`;
    iasDiv.appendChild(div);
  }
}

// Atualização
atualizarClima();
detectarMilitares();
atualizarIA();
setInterval(detectarMilitares,20000);
setInterval(atualizarIA,5000);
</script>

</body>
</html>
