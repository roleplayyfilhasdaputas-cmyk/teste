<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa de Ocorrências - Franca SP</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
  body { margin:0; font-family:Arial, sans-serif; background:#111; color:white; }
  #map { height:90vh; }
  #painel { height:10vh; padding:10px; background:#222; overflow-x:auto; white-space:nowrap; }
  .ocorrencia { display:inline-block; margin-right:20px; }
</style>
</head>
<body>

<h2 style="padding:10px">Mapa de Ocorrências - Franca SP (últimas 24h)</h2>

<div id="map"></div>
<div id="painel">
  <span class="ocorrencia">Carregando ocorrências...</span>
</div>

<script>
// 1️⃣ Mapa
var map = L.map('map').setView([-20.539, -47.401], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 2️⃣ Camada de ocorrências
var camadaOcorrencias = L.layerGroup().addTo(map);

// 3️⃣ Função para adicionar ocorrência
function adicionarOcorrencia(lat, lon, tipo, resumo, horario){
  var marcador = L.marker([lat, lon], {icon: L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
    iconSize: [30,30],
    iconAnchor: [15,30],
    popupAnchor: [0,-30]
  })}).addTo(camadaOcorrencias);

  marcador.bindPopup(`<b>${tipo}</b><br>${horario}<br>${resumo}`);

  var painel = document.getElementById("painel");
  var span = document.createElement("span");
  span.className = "ocorrencia";
  span.innerHTML = `<b>${tipo}</b>: ${resumo} (${horario})`;
  painel.appendChild(span);
}

// 4️⃣ Função para pegar notícias RSS das últimas 24h
async function pegarNoticiasRSS(){
  const rssURL = "https://g1.globo.com/rss/sp/franca-jacarei/index.xml";
  const proxy = "https://api.allorigins.win/get?url=";
  try {
    const res = await fetch(proxy + encodeURIComponent(rssURL));
    const data = await res.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, "application/xml");
    const items = xml.querySelectorAll("item");
    const noticias24h = [];

    const agora = new Date();
    items.forEach(item => {
      const title = item.querySelector("title").textContent;
      const link = item.querySelector("link").textContent;
      const pubDate = new Date(item.querySelector("pubDate").textContent);

      // Filtra últimas 24h
      if ((agora - pubDate)/(1000*60*60) <= 24) {
        noticias24h.push({title, link, pubDate});
      }
    });
    return noticias24h;
  } catch(e) {
    console.error("Erro ao pegar RSS:", e);
    return [];
  }
}

// 5️⃣ Simular geocoding e adicionar ao mapa
async function atualizarMapa() {
  camadaOcorrencias.clearLayers();
  document.getElementById("painel").innerHTML = "";

  const noticias = await pegarNoticiasRSS();

  if(noticias.length === 0){
    document.getElementById("painel").innerHTML = "<span class='ocorrencia'>Nenhuma ocorrência nas últimas 24h</span>";
    return;
  }

  noticias.forEach(n => {
    // Simula latitude/longitude aleatória próxima ao centro de Franca
    const lat = -20.539 + (Math.random()-0.5)/100;
    const lon = -47.401 + (Math.random()-0.5)/100;
    adicionarOcorrencia(lat, lon, "Notícia", n.title, n.pubDate.toLocaleString());
  });
}

// Atualiza a cada 20 minutos
setInterval(atualizarMapa, 1200000);

// Atualiza na primeira carga
atualizarMapa();

</script>
</body>
</html>
