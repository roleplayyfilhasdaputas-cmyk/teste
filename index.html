<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal do Biel</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:#c4170c;
padding:20px;
font-size:26px;
font-weight:bold;
}

nav{
background:#111;
padding:12px;
display:flex;
gap:20px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

nav a:hover{
color:#ff4444;
}

#conteudo{
height:90vh;
}

iframe{
width:100%;
height:100%;
border:none;
}

.feed{
padding:20px;
}

.item{
margin-bottom:15px;
border-left:3px solid red;
padding-left:10px;
}

</style>

</head>

<body>

<header>
🌍 PORTAL DO BIEL
</header>

<nav>

<a onclick="radar()">✈️ Radar Aviões</a>

<a onclick="militares()">🛩 Aviões Militares</a>

<a onclick="navios()">🚢 Navios Militares</a>

<a onclick="sat()">🛰 Satélites</a>

<a onclick="conflitos()">🌍 Conflitos</a>

<a onclick="ciber()">💻 Ciberataques</a>

<a onclick="foguetes()">🚀 Lançamentos</a>

<a onclick="noticias()">📰 Notícias</a>

</nav>

<div id="conteudo">

<div class="feed">
<h2>Painel Global</h2>
<p>Escolha uma ferramenta acima.</p>
</div>

</div>

<script>

function radar(){
document.getElementById("conteudo").innerHTML=`
<iframe src="https://globe.adsbexchange.com/"></iframe>
`;
}

function militares(){
document.getElementById("conteudo").innerHTML=`
<iframe src="https://globe.adsbexchange.com/?mil"></iframe>
`;
}

function navios(){
document.getElementById("conteudo").innerHTML=`
<iframe src="https://www.cruisingearth.com/military-ship-tracker/"></iframe>
`;
}

function sat(){
document.getElementById("conteudo").innerHTML=`
<iframe src="https://satellitemap.space/"></iframe>
`;
}

function conflitos(){
document.getElementById("conteudo").innerHTML=`
<iframe src="https://liveuamap.com/"></iframe>
`;
}

function ciber(){
document.getElementById("conteudo").innerHTML=`
<iframe src="https://livethreatmap.radware.com/"></iframe>
`;
}

async function foguetes(){

let res=await fetch("https://ll.thespacedevs.com/2.2.0/launch/upcoming/?limit=5");

let data=await res.json();

let html="<div class='feed'><h2>🚀 Próximos Lançamentos</h2>";

data.results.forEach(l=>{

html+=`
<div class="item">
🚀 ${l.name}<br>
📅 ${l.net}
</div>
`;

});

html+="</div>";

document.getElementById("conteudo").innerHTML=html;

}

async function noticias(){

let url="https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml";

let res=await fetch(url);

let data=await res.json();

let html="<div class='feed'><h2>📰 Notícias Globais</h2>";

data.items.slice(0,10).forEach(n=>{

html+=`
<div class="item">
📰 ${n.title}
</div>
`;

});

html+="</div>";

document.getElementById("conteudo").innerHTML=html;

}

</script>

</body>
</html>
