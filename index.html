<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Radar Investigativo de Gastos</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:#c4170c;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
padding:20px;
}

input{
padding:10px;
width:350px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
padding:10px;
margin-left:10px;
border:none;
border-radius:6px;
background:#c4170c;
color:white;
cursor:pointer;
}

.card{
background:#161616;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
}

th{
background:#1f1f1f;
}

canvas{
background:#111;
padding:10px;
border-radius:10px;
}

.loading{
color:#aaa;
font-size:14px;
margin-bottom:10px;
}

</style>

</head>

<body>

<header>
Radar Investigativo de Gastos Públicos
</header>

<div class="container">

<input id="busca" placeholder="Buscar deputado ou fornecedor">
<button onclick="exportarCSV()">Exportar CSV</button>

<div class="loading" id="status">Carregando dados...</div>

<div class="card">
<h3>Ranking de gastos</h3>
<div id="ranking"></div>
</div>

<div class="card">
<h3>Fornecedores mais usados</h3>
<div id="fornecedores"></div>
</div>

<div class="card">
<h3>CNPJs ligados a vários deputados</h3>
<div id="cnpjs"></div>
</div>

<div class="card">
<h3>Distribuição de despesas</h3>
<canvas id="grafico"></canvas>
</div>

<div class="card">

<h3>Despesas</h3>

<table>

<thead>
<tr>
<th>Deputado</th>
<th>Despesa</th>
<th>Valor</th>
<th>Fornecedor</th>
<th>Data</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>

<script>

let grafico
let dadosCSV=[]

async function buscarAno(ano){

let pagina=1
let dados=[]

while(true){

const url=`https://dadosabertos.camara.leg.br/api/v2/despesas?ano=${ano}&itens=100&pagina=${pagina}`

try{

const res=await fetch(url)
const json=await res.json()

dados=dados.concat(json.dados)

if(json.dados.length<100) break

pagina++

}catch(e){
break
}

}

return dados

}

async function carregar(){

const tabela=document.getElementById("tabela")
const rankingDiv=document.getElementById("ranking")
const fornecedoresDiv=document.getElementById("fornecedores")
const cnpjDiv=document.getElementById("cnpjs")
const status=document.getElementById("status")

tabela.innerHTML=""
rankingDiv.innerHTML=""
fornecedoresDiv.innerHTML=""
cnpjDiv.innerHTML=""

const deputados={}
const fornecedores={}
const categorias={}
const cnpjs={}

const anoAtual=new Date().getFullYear()

let todosDados=[]
let totalGeral=0

for(let ano=2020;ano<=anoAtual;ano++){

status.innerText=`Carregando dados de ${ano}...`

const dadosAno=await buscarAno(ano)

todosDados=todosDados.concat(dadosAno)

}

status.innerText=`${todosDados.length} registros carregados`

todosDados.forEach(g=>{

const valor=parseFloat(g.valorLiquido) || 0
totalGeral+=valor

dadosCSV.push([
g.nomeDeputado,
g.tipoDespesa,
valor,
g.nomeFornecedor,
g.dataDocumento
])

const linha=document.createElement("tr")

linha.innerHTML=`
<td>${g.nomeDeputado || "-"}</td>
<td>${g.tipoDespesa || "-"}</td>
<td>R$ ${valor.toLocaleString()}</td>
<td>${g.nomeFornecedor || "-"}</td>
<td>${g.dataDocumento || "-"}</td>
`

tabela.appendChild(linha)

if(!deputados[g.nomeDeputado]) deputados[g.nomeDeputado]=0
deputados[g.nomeDeputado]+=valor

if(!fornecedores[g.nomeFornecedor]) fornecedores[g.nomeFornecedor]=0
fornecedores[g.nomeFornecedor]++

if(!categorias[g.tipoDespesa]) categorias[g.tipoDespesa]=0
categorias[g.tipoDespesa]+=valor

const cnpj=g.cnpjCpfFornecedor || "Desconhecido"

if(!cnpjs[cnpj]) cnpjs[cnpj]=[]

cnpjs[cnpj].push(g.nomeDeputado)

})

rankingDiv.innerHTML+=`<p><b>Total analisado:</b> R$ ${Math.round(totalGeral).toLocaleString()}</p>`

Object.entries(deputados)
.sort((a,b)=>b[1]-a[1])
.slice(0,5)
.forEach(r=>{

rankingDiv.innerHTML+=`
<p>${r[0]} — R$ ${Math.round(r[1]).toLocaleString()}</p>
`

})

Object.entries(fornecedores)
.sort((a,b)=>b[1]-a[1])
.slice(0,5)
.forEach(f=>{

fornecedoresDiv.innerHTML+=`
<p>${f[0]} — ${f[1]} pagamentos</p>
`

})

Object.keys(cnpjs).forEach(c=>{

const deps=[...new Set(cnpjs[c])]

if(deps.length>4){

cnpjDiv.innerHTML+=`
<p>${c} — ligado a ${deps.length} deputados</p>
`

}

})

if(grafico) grafico.destroy()

grafico=new Chart(
document.getElementById("grafico"),
{
type:'bar',
data:{
labels:Object.keys(categorias),
datasets:[{
label:"Total gasto (R$)",
data:Object.values(categorias),
backgroundColor:"#c4170c"
}]
},
options:{
responsive:true,
plugins:{
legend:{display:false}
}
}
})

}

function exportarCSV(){

let csv="Deputado,Despesa,Valor,Fornecedor,Data\n"

dadosCSV.forEach(l=>{

csv+=l.join(",")+"\n"

})

const blob=new Blob([csv],{type:"text/csv"})

const link=document.createElement("a")

link.href=URL.createObjectURL(blob)
link.download="gastos_deputados.csv"

link.click()

}

carregar()

document.getElementById("busca").addEventListener("keyup",function(){

const filtro=this.value.toLowerCase()

document.querySelectorAll("#tabela tr").forEach(linha=>{

linha.style.display=
linha.innerText.toLowerCase().includes(filtro)
? ""
: "none"

})

})

</script>

</body>
</html>
