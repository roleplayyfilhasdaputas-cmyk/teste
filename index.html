<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel Militar</title>

<style>
body {
  margin: 0;
  font-family: 'Courier New', monospace;
  background: #050505;
  color: #00ff9c;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* Header estilo HUD */
header {
  background: #111;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid #00ff9c;
  animation: glow 1.5s infinite alternate;
  flex-shrink: 0;
}

@keyframes glow {
  from { box-shadow: 0 0 10px #00ff9c; }
  to { box-shadow: 0 0 20px #00ff9c; }
}

/* Conteúdo radar */
#conteudo {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* Radar circular */
#radar {
  width: 80vmin;
  height: 80vmin;
  border: 2px solid #00ff9c;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 30px #00ff9c;
}

/* Linhas do radar */
.radar-line {
  position: absolute;
  width: 2px;
  height: 100%;
  background: rgba(0,255,156,0.3);
  top: 0;
  left: 50%;
  transform-origin: bottom center;
  animation: rotate 4s linear infinite;
}

.radar-line:nth-child(2) { animation-delay: 1s; }
.radar-line:nth-child(3) { animation-delay: 2s; }
.radar-line:nth-child(4) { animation-delay: 3s; }

@keyframes rotate {
  0% { transform: rotate(0deg) translateX(-50%); }
  100% { transform: rotate(360deg) translateX(-50%); }
}

/* Pontos de detecção simulados */
.ponto {
  width: 8px;
  height: 8px;
  background: red;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  animation: pulse 2s infinite alternate;
}

@keyframes pulse {
  0% { transform: translate(-50%, -50%) scale(1); opacity:1; }
  100% { transform: translate(-50%, -50%) scale(1.5); opacity:0; }
}

/* Alerta inferior */
#alerta {
  background: #111;
  border-top: 2px solid red;
  color: red;
  padding: 8px;
  font-size: 16px;
  text-align: center;
  animation: alertGlow 1s infinite alternate;
  flex-shrink: 0;
}

@keyframes alertGlow {
  from { text-shadow: 0 0 5px red; }
  to { text-shadow: 0 0 20px red; }
}

noscript {
  color: yellow;
  font-size: 16px;
  text-align: center;
}
</style>
</head>

<body>

<header>
  🛰 PAINEL MILITAR
  <div>
    🕒 <span id="hora"></span>
  </div>
</header>

<div id="conteudo">
  <div id="radar">
    <div class="radar-line"></div>
    <div class="radar-line"></div>
    <div class="radar-line"></div>
    <div class="radar-line"></div>

    <!-- Pontos simulando detecções -->
    <div class="ponto" style="top:30%; left:40%;"></div>
    <div class="ponto" style="top:70%; left:60%;"></div>
    <div class="ponto" style="top:50%; left:80%;"></div>
  </div>

  <noscript>
    ⚠ JavaScript está desativado. Ative para ver o radar e relógio.
  </noscript>
</div>

<div id="alerta">
  ⚠ MONITORAMENTO DE AVIÕES MILITARES ATIVO
</div>

<script>
const hora = document.getElementById("hora");

function atualizarHora() {
  const agora = new Date();
  hora.innerText = agora.toLocaleString('pt-BR', { 
    hour12: false, 
    day: '2-digit', 
    month: '2-digit', 
    year: 'numeric', 
    hour: '2-digit', 
    minute: '2-digit', 
    second: '2-digit' 
  });
}

setInterval(atualizarHora, 1000);
atualizarHora();
</script>

</body>
</html>
