<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal Global de Monitoramento</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
}

header{
background:#c4170c;
padding:20px;
font-size:28px;
font-weight:bold;
}

#map{
height:600px;
}

.painel{
padding:15px;
background:#111;
border-top:2px solid #c4170c;
}

.log{
background:black;
color:#00ff90;
padding:10px;
height:200px;
overflow:auto;
font-family:monospace;
}

button{
background:#c4170c;
border:none;
color:white;
padding:10px;
margin:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
🌍 Centro Global de Monitoramento
</header>

<div id="map"></div>

<div class="painel">

<button onclick="alertaNuclear()">☢ Alerta Nuclear</button>
<button onclick="detectarPortaAvioes()">🚢 Detectar Porta-Aviões</button>
<button onclick="ativarIA()">🤖 Ativar IA Investigadora</button>

<h3>🤖 Log da IA</h3>

<div class="log" id="log"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

function log(texto){

var logBox = document.getElementById("log");

logBox.innerHTML += "> "+texto+"<br>";

logBox.scrollTop = logBox.scrollHeight;

}

function alertaNuclear(){

var locais = [
[55,37],
[40,-74],
[35,139],
[48,2]
];

locais.forEach(function(l){

L.circle(l,{
color:'red',
radius:300000
}).addTo(map);

});

log("ALERTA: atividade nuclear detectada (simulação)");

}

function detectarPortaAvioes(){

var navios = [

[25,-70],
[35,140],
[20,60],
[10,-40]

];

navios.forEach(function(n){

L.marker(n).addTo(map)
.bindPopup("🚢 Porta-aviões detectado");

});

log("IA: porta-aviões detectados no oceano");

}

function ativarIA(){

log("IA iniciada...");

setTimeout(()=>{

log("IA analisando eventos globais...");

},2000);

setTimeout(()=>{

log("IA detectou aumento de atividade militar");

},4000);

setTimeout(()=>{

log("IA recomendação: monitorar regiões estratégicas");

},6000);

}

</script>

</body>
</html>
