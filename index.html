<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Painel Investigativo de Gastos Públicos - Todos Deputados</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body {
    background:#0b0b0b;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
    height: 100vh;
    display: grid;
    grid-template-columns: 300px 1fr;
    overflow: hidden;
  }
  header {
    grid-column: 1 / 3;
    background:#c40000;
    padding:20px;
    font-size:24px;
    font-weight:bold;
  }
  #listaDeputados {
    background:#141414;
    padding: 20px;
    overflow-y: auto;
    border-right: 1px solid #333;
  }
  #listaDeputados h3 {
    margin-top: 0;
    margin-bottom: 10px;
  }
  #listaDeputados input {
    width: 100%;
    padding: 8px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: none;
    background: #222;
    color: white;
  }
  #listaDeputados ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  #listaDeputados li {
    padding: 8px 10px;
    cursor: pointer;
    border-radius: 6px;
  }
  #listaDeputados li:hover,
  #listaDeputados li.active {
    background: #c40000;
    font-weight: bold;
  }
  #conteudo {
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 60px);
  }
  .searchExport {
    margin-bottom: 15px;
    display: flex;
    gap: 10px;
  }
  .searchExport input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: none;
  }
  .searchExport button {
    background: #c40000;
    border: none;
    color: white;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    flex-grow: 1;
    overflow: hidden;
  }
  .card {
    background: #141414;
    padding: 20px;
    border-radius: 10px;
    overflow-y: auto;
  }
  canvas {
    background: #0f0f0f;
    border-radius: 10px;
    padding: 10px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }
  th, td {
    padding: 10px;
    border-bottom: 1px solid #333;
    text-align: left;
  }
  th { color: #ccc; }
  #count { margin-bottom: 10px; }
</style>
</head>
<body>
<header>Painel Investigativo de Gastos Públicos - Todos Deputados</header>

<div id="listaDeputados">
  <h3>Deputados</h3>
  <input type="text" id="filtraDeputados" placeholder="Filtrar deputados..." autocomplete="off" />
  <ul id="deputadosList"></ul>
</div>

<div id="conteudo">
  <div class="searchExport">
    <input id="search" placeholder="Buscar deputado" autocomplete="off" />
    <button onclick="buscarDeputado()">Buscar</button>
    <button onclick="exportCSV()">Exportar CSV</button>
  </div>
  <div id="count"></div>
  <div class="grid">
    <div class="card">
      <h3>Ranking de gastos por tipo</h3>
      <ul id="ranking"></ul>
    </div>
    <div class="card">
      <h3>Pagamentos altos detectados</h3>
      <ul id="altos"></ul>
    </div>
    <div class="card">
      <h3>Distribuição de despesas</h3>
      <canvas id="graficoDespesa"></canvas>
    </div>
    <div class="card">
      <h3>Top gastos</h3>
      <canvas id="graficoValores"></canvas>
    </div>
  </div>
  <div class="card" style="margin-top: 20px;">
    <h3>Despesas</h3>
    <table id="tabela">
      <thead>
        <tr>
          <th>Deputado</th>
          <th>Tipo</th>
          <th>Valor</th>
          <th>Fornecedor</th>
          <th>Data</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
let dados = [];
let deputados = [];
let graficoDespesa, graficoValores;
let deputadoSelecionadoId = null;

async function carregarDeputados() {
  deputados = [];
  let pagina = 1;
  let totalDeputados = 1;
  try {
    while(deputados.length < totalDeputados) {
      const res = await fetch(`https://dadosabertos.camara.leg.br/api/v2/deputados?itens=100&pagina=${pagina}`);
      const json = await res.json();
      deputados = deputados.concat(json.dados);
      if(pagina === 1) totalDeputados = json.metadados.totalRegistros || json.dados.length;
      if(json.dados.length === 0) break;
      pagina++;
    }
    popularListaDeputados(deputados);
    if(deputados.length) {
      const primeiro = deputados[0];
      const li = [...document.querySelectorAll('#deputadosList li')].find(li => li.dataset.id == primeiro.id);
      if(li) {
        li.classList.add('active');
        deputadoSelecionadoId = primeiro.id;
        carregarDespesasAnos(primeiro.id, primeiro.nome, 2023, 2026);
      }
    }
  } catch(e) {
    console.error("Erro ao carregar deputados:", e);
  }
}

function popularListaDeputados(lista) {
  const ul = document.getElementById('deputadosList');
  ul.innerHTML = '';
  lista.forEach(dep => {
    const li = document.createElement('li');
    li.textContent = dep.nome;
    li.dataset.id = dep.id;
    li.addEventListener('click', () => selecionarDeputado(dep.id, dep.nome, li));
    ul.appendChild(li);
  });
}

function selecionarDeputado(id, nome, elementoLi) {
  deputadoSelecionadoId = id;
  document.querySelectorAll('#deputadosList li').forEach(li => li.classList.remove('active'));
  elementoLi.classList.add('active');
  document.getElementById('search').value = nome;
  carregarDespesasAnos(id, nome, 2023, 2026);
}

document.getElementById('filtraDeputados').addEventListener('input', e => {
  const filtro = e.target.value.toLowerCase();
  const filtered = deputados.filter(d => d.nome.toLowerCase().includes(filtro));
  popularListaDeputados(filtered);
});

async function carregarDespesasAnos(id, nome, anoInicio, anoFim) {
  try {
    dados = [];
    document.getElementById('count').innerText = 'Carregando despesas...';
    for(let ano = anoInicio; ano <= anoFim; ano++) {
      let pagina = 1;
      let total = 1;
      while(dados.length < total) {
        const res = await fetch(`https://dadosabertos.camara.leg.br/api/v2/deputados/${id}/despesas?ano=${ano}&itens=100&pagina=${pagina}`);
        if(!res.ok) throw new Error(`Erro ao buscar despesas para o ano ${ano}: ${res.status}`);
        const json = await res.json();
        if(pagina === 1) total = json.metadados.totalRegistros || json.dados.length;
        dados = dados.concat(json.dados.map(d => ({
          deputado: nome,
          tipo: d.tipoDespesa,
          valor: parseFloat(d.valorLiquido),
          fornecedor: d.nomeFornecedor,
          data: d.dataDocumento
        })));
        if(json.dados.length === 0) break;
        pagina++;
      }
    }
    renderTabela();
    ranking();
    pagamentosAltos();
    graficoDespesas();
    graficoValores();
    document.getElementById('count').innerText = `${dados.length} registros carregados`;
  } catch (e) {
    document.getElementById('count').innerText = `Erro ao carregar despesas: ${e.message}`;
    console.error(e);
  }
}

function renderTabela() {
  const tbody = document.querySelector('#tabela tbody');
  tbody.innerHTML = '';
  dados.forEach(d => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${d.deputado}</td><td>${d.tipo}</td><td>R$ ${d.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td><td>${d.fornecedor}</td><td>${d.data}</td>`;
    tbody.appendChild(tr);
  });
}

function ranking() {
  const mapa = {};
  dados.forEach(d => { mapa[d.tipo] = (mapa[d.tipo] || 0) + d.valor; });
  const lista = Object.entries(mapa).sort((a,b)=>b[1]-a[1]);
  const ul = document.getElementById('ranking'); ul.innerHTML='';
  lista.forEach(([tipo, valor])=>{ 
    const li=document.createElement('li'); 
    li.innerText=`${tipo} - R$ ${valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}`; 
    ul.appendChild(li); 
  });
}

function pagamentosAltos() {
  const ul = document.getElementById('altos'); ul.innerHTML='';
  dados.filter(d=>d.valor>10000).forEach(d=>{
    const li=document.createElement('li');
    li.innerText=`${d.tipo} - R$ ${d.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
    ul.appendChild(li);
  });
}

function graficoDespesas() {
  const mapa = {};
  dados.forEach(d => { mapa[d.tipo]=(mapa[d.tipo]||0)+d.valor; });
  if(graficoDespesa) graficoDespesa.destroy();
  graficoDespesa = new Chart(document.getElementById('graficoDespesa'),{
    type:'pie',
    data:{
      labels:Object.keys(mapa),
      datasets:[{
        data:Object.values(mapa),
        backgroundColor:[
          '#c40000','#ff5733','#ff8d1a','#ffc300','#d4ff00','#aaff00',
          '#5aff00','#00ff55','#00ffd4','#00aaff','#0040ff','#5500ff'
        ]
      }]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{position:'right',labels:{color:'white'}}
      }
    }
  });
}

function graficoValores() {
  if(graficoValores) graficoValores.destroy();
  const top = dados.slice().sort((a,b)=>b.valor-a.valor).slice(0,5);
  graficoValores = new Chart(document.getElementById('graficoValores'),{
    type:'bar',
    data:{
      labels:top.map(d=>d.tipo),
      datasets:[{
        label:'Valor',
        data:top.map(d=>d.valor),
        backgroundColor:'#c40000'
      }]
    },
    options:{
      responsive:true,
      scales:{
        y:{beginAtZero:true,ticks:{color:'white'}},
        x:{ticks:{color:'white'}}
      },
      plugins:{legend:{display:false}}
    }
  });
}

function exportCSV() {
  if(!dados.length){ alert('Nenhum dado para exportar!'); return; }
  let csv='Deputado,Tipo,Valor,Fornecedor,Data\n';
  dados.forEach(d=>{
    csv+=`"${d.deputado}","${d.tipo}","${d.valor.toFixed(2)}","${d.fornecedor}","${d.data}"\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='gastos_deputado.csv';
  a.click();
}

function buscarDeputado(){
  const filtro = document.getElementById('search').value.toLowerCase();
  const dep = deputados.find(d => d.nome.toLowerCase() === filtro);
  if(dep) {
    const li = [...document.querySelectorAll('#deputadosList li')].find(li => li.dataset.id == dep.id);
    if(li) selecionarDeputado(dep.id, dep.nome, li);
  } else {
    alert('Deputado não encontrado');
  }
}

// Atualiza dados a cada 30 minutos
setInterval(() => {
  if(deputadoSelecionadoId) {
    const dep = deputados.find(d => d.id === deputadoSelecionadoId);
    if(dep) carregarDespesasAnos(deputadoSelecionadoId, dep.nome, 2023, 2026);
  }
}, 1800000);

carregarDeputados();
</script>
</body>
</html>
