<!DOCTYPE html> <html lang="pt-BR"> <head> <meta charset="UTF-8"> <title>Radar Aéreo Franca</title> <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/> <style> body{ margin:0; background:#081018; color:white; font-family:Arial; } #map{ height:100vh; width:100%; } </style> </head> <body> <div id="map"></div> <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> <script> // centro Franca var map = L.map('map').setView([-20.551,-47.407],14); // mapa base L.tileLayer( 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map); // área Jardim Aeroporto 3 var bairro = [ [-20.5575,-47.4160], [-20.5575,-47.3980], [-20.5450,-47.3980], [-20.5450,-47.4160] ]; L.polygon(bairro,{ color:"red", fillColor:"red", fillOpacity:0.3 }).addTo(map) .bindPopup("Jardim Aeroporto III"); </script> </body> </html>
