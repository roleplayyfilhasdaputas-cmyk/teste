<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel do Biel</title>

<style>

body{
margin:0;
font-family:Courier New, monospace;
background:#050505;
color:#00ff9c;
}

header{
background:#111;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #00ff9c;
}

button{
background:#000;
color:#00ff9c;
border:1px solid #00ff9c;
padding:6px 12px;
cursor:pointer;
}

#painelAparicoes{
position:fixed;
top:60px;
right:10px;
width:320px;
height:300px;
background:#000;
border:2px solid #00ff9c;
padding:10px;
display:none;
overflow:auto;
}

#conteudo{
height:80vh;
}

iframe{
width:100%;
height:100%;
border:none;
}

#alerta{
background:#111;
border-top:2px solid red;
color:red;
padding:8px;
font-size:13px;
text-align:center;
}

</style>

</head>

<body>

<header>

<div>🛰 PAINEL DO BIEL</div>

<div>

<button onclick="toggleAparicoes()">APARIÇÕES</button>

🕒 <span id="hora"></span>

</div>

</header>

<div id="painelAparicoes">

<h3>APARIÇÕES B-2 SPIRIT</h3>

<div id="listaAparicoes">

Nenhuma aparição registrada

</div>

</div>

<div id="conteudo">

<iframe id="radar" src="https://globe.adsbexchange.com/?mil"></iframe>

</div>

<div id="alerta">

⚠ MONITORAMENTO DE AVIÕES MILITARES ATIVO

</div>

<script>

const hora = document.getElementById("hora")
const alerta = document.getElementById("alerta")
const lista = document.getElementById("listaAparicoes")
const painel = document.getElementById("painelAparicoes")
const radar = document.getElementById("radar")

setInterval(()=>{
hora.innerText = new Date().toLocaleTimeString()
},1000)

function toggleAparicoes(){

if(painel.style.display === "none"){
painel.style.display = "block"
}else{
painel.style.display = "none"
}

}

async function detectarB2(){

try{

const res = await fetch("https://api.adsbexchange.com/v2/mil/")
const data = await res.json()

let aeronaves = data.ac

let encontrados = aeronaves.filter(a =>

(a.t && a.t.includes("B2")) ||
(a.desc && a.desc.includes("B-2")) ||
(a.r && a.r.includes("SPIRIT"))

)

if(encontrados.length > 0){

alerta.innerText = "🚨 B-2 SPIRIT DETECTADO"

let b2 = encontrados[0]

let lat = b2.lat
let lon = b2.lon

radar.src =
`https://globe.adsbexchange.com/?lat=${lat}&lon=${lon}&zoom=8&mil`

let horario = new Date().toLocaleTimeString()

let linha = document.createElement("div")

linha.innerText =
"🛩 " + horario +
" | LAT: " + lat +
" | LON: " + lon

lista.prepend(linha)

}

}catch(e){

console.log("Erro ao verificar aeronaves")

}

}

setInterval(detectarB2,30000)

</script>

</body>
</html>
