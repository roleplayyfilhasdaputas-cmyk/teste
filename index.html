<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa de Ocorrências - Franca SP</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
}

#map{
height:90vh;
}

#painel{
height:10vh;
background:#222;
overflow-x:auto;
white-space:nowrap;
padding:10px;
}

.ocorrencia{
display:inline-block;
margin-right:20px;
}
</style>
</head>

<body>

<h2 style="padding:10px">Ocorrências em Franca - últimas 24h</h2>

<div id="map"></div>
<div id="painel"></div>

<script>

var map = L.map('map').setView([-20.539,-47.401],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var cluster = L.markerClusterGroup();
var heat = L.heatLayer([], {radius:25}).addTo(map);

map.addLayer(cluster);

function adicionarNoticia(lat,lon,titulo,horario,tipo){

let cor="gray";

if(tipo=="acidente") cor="yellow";
if(tipo=="roubo") cor="red";
if(tipo=="assassinato") cor="black";

var marker=L.circleMarker([lat,lon],{
radius:7,
color:cor,
fillColor:cor,
fillOpacity:0.8
});

marker.bindPopup(
"<b>"+titulo+"</b><br>"+
"Tipo: "+tipo+"<br>"+
"Publicado: "+horario
);

cluster.addLayer(marker);

heat.addLatLng([lat,lon,1]);

var painel=document.getElementById("painel");

var span=document.createElement("span");

span.className="ocorrencia";

span.innerHTML=
"<b>"+tipo.toUpperCase()+"</b> - "+
titulo+
" ("+horario+")";

painel.appendChild(span);

}

const feeds=[

"https://g1.globo.com/rss/sp/franca-jacarei/index.xml",

"https://acidadeon.com/franca/rss",

"https://g1.globo.com/rss/sp/cn/index.xml"

];

async function pegarNoticias(){

const proxy="https://api.allorigins.win/get?url=";

let noticias=[];

let agora=new Date();

for(const feed of feeds){

try{

let res=await fetch(proxy+encodeURIComponent(feed));

let data=await res.json();

let parser=new DOMParser();

let xml=parser.parseFromString(data.contents,"application/xml");

let items=xml.querySelectorAll("item");

items.forEach(item=>{

let titulo=item.querySelector("title").textContent;

let pub=item.querySelector("pubDate").textContent;

let pubDate=new Date(pub);

let diff=(agora-pubDate)/(1000*60*60);

if(diff<=24){

noticias.push({
titulo:titulo,
data:pubDate
});

}

});

}catch(e){

console.log("erro feed",e);

}

}

return noticias;

}

function detectarTipo(titulo){

titulo=titulo.toLowerCase();

if(titulo.includes("acidente")) return "acidente";

if(titulo.includes("roubo")) return "roubo";

if(titulo.includes("assalto")) return "roubo";

if(titulo.includes("assassinato")) return "assassinato";

if(titulo.includes("homicídio")) return "assassinato";

return null;

}

function extrairLocal(titulo){

let rua=titulo.match(/(Rua|Avenida|Av|Praça|Travessa|Alameda) [\w\s]+/i);

if(rua) return rua[0];

let bairros=[
"Centro",
"Jardim Planalto",
"Vila Santa Clara",
"Jardim Paulista",
"Vila Lemos"
];

for(let b of bairros){

if(titulo.includes(b)) return b;

}

return null;

}

async function geocode(local){

try{

let url="https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(local+", Franca SP");

let res=await fetch(url);

let data=await res.json();

if(data.length>0){

return{
lat:parseFloat(data[0].lat),
lon:parseFloat(data[0].lon)
};

}

}catch(e){}

return null;

}

async function atualizar(){

cluster.clearLayers();

heat.setLatLngs([]);

document.getElementById("painel").innerHTML="";

let noticias=await pegarNoticias();

for(let n of noticias){

let tipo=detectarTipo(n.titulo);

if(!tipo) continue;

let local=extrairLocal(n.titulo);

if(!local) continue;

let coords=await geocode(local);

if(!coords) continue;

let horario=n.data.toLocaleString("pt-BR");

adicionarNoticia(
coords.lat,
coords.lon,
n.titulo,
horario,
tipo
);

}

}

setInterval(atualizar,5000);

atualizar();

</script>

</body>
</html>
