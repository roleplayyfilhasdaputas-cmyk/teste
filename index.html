<!DOCTYPE html> <html lang="pt-BR"> <head> <meta charset="UTF-8"> <title>Radar Aéreo - Jardim Aeroporto III</title> <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/> <style> body{ margin:0; font-family:Arial; background:#050b14; color:white; } #topbar{ background:#0f172a; padding:12px; font-size:18px; font-weight:bold; } #container{ display:flex; height:92vh; } #map{ flex:3; } #painel{ flex:1; background:#020617; padding:15px; border-left:2px solid #111827; overflow:auto; } .alerta{ background:#ff0000; padding:10px; margin-bottom:10px; display:none; font-weight:bold; } .card{ background:#111827; padding:10px; margin-bottom:10px; border-radius:6px; } </style> </head> <body> <div id="topbar"> 🚁 Radar de Helicópteros — Jardim Aeroporto III </div> <div id="container"> <div id="map"></div> <div id="painel"> <div id="alerta" class="alerta"> ⚠ Aeronave detectada dentro do bairro! </div> <h3>Aeronaves próximas</h3> <div id="lista"></div> </div> </div> <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> <script> // centro aproximado var centro = { lat:-20.551, lon:-47.407 }; // mapa var map = L.map('map').setView([centro.lat,centro.lon],14); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{ maxZoom:19 }).addTo(map); // polígono Jardim Aeroporto III var bairro = [ [-20.5575,-47.4160], [-20.5575,-47.3980], [-20.5450,-47.3980], [-20.5450,-47.4160] ]; var area = L.polygon(bairro,{ color:"red", fillColor:"red", fillOpacity:0.3 }).addTo(map); area.bindPopup("Área monitorada"); // trilhas var trilhas={}; // função distância function distancia(lat1,lon1,lat2,lon2){ var R=6371; var dLat=(lat2-lat1)*Math.PI/180; var dLon=(lon2-lon1)*Math.PI/180; var a= Math.sin(dLat/2)*Math.sin(dLat/2)+ Math.cos(lat1*Math.PI/180)* Math.cos(lat2*Math.PI/180)* Math.sin(dLon/2)*Math.sin(dLon/2); var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); return R*c; } // verificar se está no bairro function dentroDoBairro(lat,lon){ return lat>-20.5575 && lat<-20.5450 && lon>-47.4160 && lon<-47.3980; } async function radar(){ let r = await fetch("https://opensky-network.org/api/states/all"); let data = await r.json(); document.getElementById("lista").innerHTML=""; data.states.forEach(a=>{ let id=a[0]; let callsign=a[1]; let lon=a[5]; let lat=a[6]; let alt=a[7]; let vel=a[9]; if(!lat || !lon) return; if(dentroDoBairro(lat,lon)){ L.marker([lat,lon]).addTo(map) .bindPopup("Aeronave: "+callsign); document.getElementById("alerta").style.display="block"; if(!trilhas[id]) trilhas[id]=[]; trilhas[id].push([lat,lon]); L.polyline(trilhas[id],{color:"yellow"}).addTo(map); let card = ` <div class="card"> <b>${callsign}</b><br> Altitude: ${alt} m<br> Velocidade: ${vel} m/s </div> `; document.getElementById("lista").innerHTML+=card; } }); } radar(); setInterval(radar,20000); </script> </body> </html>
