<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel do Biel</title>

<style>

body{
margin:0;
font-family:Courier New, monospace;
background:#050505;
color:#00ff9c;
}

header{
background:#111;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #00ff9c;
}

#conteudo{
height:80vh;
}

iframe{
width:100%;
height:100%;
border:none;
}

#alerta{
background:#111;
border-top:2px solid red;
color:red;
padding:8px;
font-size:13px;
text-align:center;
}

#log{
background:#000;
color:#00ff9c;
font-size:11px;
padding:10px;
height:120px;
overflow:auto;
border-top:1px solid #00ff9c;
}

</style>

</head>

<body>

<header>

<div>🛰 PAINEL DO BIEL</div>

<div>
🕒 <span id="hora"></span>
</div>

</header>

<div id="conteudo">

<iframe src="https://globe.adsbexchange.com/?mil"></iframe>

</div>

<div id="alerta">

⚠ MONITORAMENTO DE AVIÕES MILITARES ATIVO

</div>

<div id="log"></div>

<script>

const hora = document.getElementById("hora")
const alerta = document.getElementById("alerta")
const log = document.getElementById("log")

setInterval(()=>{
hora.innerText = new Date().toLocaleTimeString()
},1000)

async function detectarB2(){

try{

const res = await fetch("https://api.adsbexchange.com/v2/mil/")
const data = await res.json()

let aeronaves = data.ac

let encontrados = aeronaves.filter(a =>
(a.t && a.t.includes("B2")) ||
(a.desc && a.desc.includes("B-2")) ||
(a.r && a.r.includes("SPIRIT"))
)

if(encontrados.length > 0){

alerta.innerText = "🚨 POSSÍVEL B-2 SPIRIT DETECTADO NO RADAR"

encontrados.forEach(b2=>{

let linha = document.createElement("div")

linha.innerText =
"DETECÇÃO: " +
(new Date().toLocaleTimeString()) +
" | CALLSIGN: " + (b2.r || "desconhecido") +
" | LAT: " + b2.lat +
" | LON: " + b2.lon

log.prepend(linha)

})

}

}catch(e){

console.log("Erro ao verificar aeronaves")

}

}

setInterval(detectarB2,30000)

</script>

</body>
</html>
