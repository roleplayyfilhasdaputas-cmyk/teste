<!DOCTYPE html> <html lang="pt-BR"> <head> <meta charset="UTF-8"> <title>Radar Aéreo Franca</title> <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/> <style> body{ margin:0; font-family:Arial; background:#020617; color:white; } #topbar{ background:#0f172a; padding:12px; font-size:18px; } #container{ display:flex; height:94vh; } #map{ flex:3; } #painel{ flex:1; background:#020617; padding:10px; overflow:auto; border-left:2px solid #111827; } .card{ background:#111827; padding:8px; margin-bottom:8px; border-radius:6px; } .alerta{ background:red; padding:10px; display:none; margin-bottom:10px; } </style> </head> <body> <div id="topbar"> 🚁 Radar Aéreo - Franca </div> <div id="container"> <div id="map"></div> <div id="painel"> <div id="alerta" class="alerta"> ⚠ Aeronave no bairro </div> <h3>Detecções</h3> <div id="lista"></div> </div> </div> <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> <script> // centro de Franca var centro = [-20.551,-47.407]; var map = L.map('map').setView(centro,13); // mapa base L.tileLayer( 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map); // área Jardim Aeroporto III var bairro = [ [-20.5575,-47.4160], [-20.5575,-47.3980], [-20.5450,-47.3980], [-20.5450,-47.4160] ]; L.polygon(bairro,{ color:"red", fillColor:"red", fillOpacity:0.3 }).addTo(map); // verificar se está no bairro function dentro(lat,lon){ return lat>-20.5575 && lat<-20.5450 && lon>-47.4160 && lon<-47.3980; } // buscar aeronaves async function radar(){ let r = await fetch( "https://opensky-network.org/api/states/all" ); let data = await r.json(); document.getElementById("lista").innerHTML=""; data.states.forEach(a=>{ let callsign=a[1]; let lon=a[5]; let lat=a[6]; let alt=a[7]; if(!lat || !lon) return; if(dentro(lat,lon)){ L.marker([lat,lon]).addTo(map) .bindPopup("Aeronave: "+callsign); document.getElementById("alerta") .style.display="block"; let card = ` <div class="card"> <b>${callsign}</b><br> Altitude: ${alt} </div> `; document.getElementById("lista") .innerHTML+=card; } }); } radar(); setInterval(radar,20000); </script> </body> </html>
