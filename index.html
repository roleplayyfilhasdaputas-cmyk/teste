<!DOCTYPE html> <html lang="pt-BR"> <head> <meta charset="UTF-8"> <title>Radar Helicóptero do Bairro</title> <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/> <style> body{ font-family:Arial; background:#0b0f1a; color:white; text-align:center; } #map{ height:520px; margin:20px; border-radius:10px; } #alerta{ background:#ff2a2a; padding:12px; display:none; margin:10px; font-weight:bold; } </style> </head> <body> <h2>🚁 Radar de Helicópteros</h2> <p>Monitoramento do bairro</p> <div id="alerta"> ⚠ Helicóptero detectado na área! </div> <div id="map"></div> <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> <script> var bairro = { lat:-20.5386, lon:-47.4000 }; var raio = 2; // km var map = L.map('map').setView([bairro.lat,bairro.lon],13); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); var zona = L.circle([bairro.lat,bairro.lon],{ radius:raio*1000 }).addTo(map); var trajetos = {}; function distancia(lat1,lon1,lat2,lon2){ var R = 6371; var dLat=(lat2-lat1)*Math.PI/180; var dLon=(lon2-lon1)*Math.PI/180; var a= Math.sin(dLat/2)*Math.sin(dLat/2)+ Math.cos(lat1*Math.PI/180)* Math.cos(lat2*Math.PI/180)* Math.sin(dLon/2)*Math.sin(dLon/2); var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); return R*c; } async function radar(){ let res = await fetch("https://opensky-network.org/api/states/all"); let data = await res.json(); data.states.forEach(a=>{ let id=a[0]; let callsign=a[1]; let lon=a[5]; let lat=a[6]; let vel=a[9]; if(!lat || !lon) return; let dist = distancia(bairro.lat,bairro.lon,lat,lon); if(dist < raio){ let marker = L.marker([lat,lon]).addTo(map) .bindPopup("Aeronave: "+callsign); document.getElementById("alerta").style.display="block"; if(!trajetos[id]){ trajetos[id]=[]; } trajetos[id].push([lat,lon]); L.polyline(trajetos[id]).addTo(map); } }); } radar(); setInterval(radar,20000); </script> </body> </html>
