<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Radar de Ocorrências – Funcional</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }
#map { height:50vh; }
#painel { height:50vh; background:#222; overflow:auto; padding:10px; display:flex; flex-direction:row; }
#timeline { flex:1; overflow:auto; padding-right:10px; }
#dashboard { flex:1; padding-left:10px; }
.timeline-item { margin-bottom:5px; }
.alert-marker { animation: pulse 1s infinite; }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
.controls { margin-bottom:10px; }
</style>
</head>

<body>
<h2 style="padding:10px">Radar de Ocorrências – Funcional Teste</h2>

<div class="controls">
  Tipo de Crime:
  <select id="filtroTipo">
    <option value="todos">Todos</option>
    <option value="acidente">Acidente</option>
    <option value="roubo">Roubo/Assalto</option>
    <option value="homicídio">Homicídio/Assassinato</option>
  </select>
</div>

<div id="map"></div>
<div id="painel">
  <div id="timeline"></div>
  <div id="dashboard">
    <canvas id="chartBairro"></canvas>
    <canvas id="chartHora"></canvas>
  </div>
</div>

<script>
// Inicializa mapa
const map = L.map('map').setView([-20.538, -47.401],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Tipos de crime
const crimeIcons = {
  "acidente": "yellow",
  "roubo": "red",
  "assalto": "red",
  "homicídio": "black",
  "assassinato": "black"
};

// Coordenadas de bairros
const bairrosCoords = {
  "Centro": [-20.538, -47.400],
  "Jardim América": [-20.540, -47.402],
  "Vila Frezzarin": [-20.534, -47.405],
  "Vila Real": [-20.535, -47.399],
  "Desconhecido": [-20.538, -47.401]
};

// Marcadores e heatmap
let markers = [];
let heatPoints = [];
let heatLayer;

// Função para detectar tipo de crime
function tipoCrime(t){
  t = t.toLowerCase();
  for(let key in crimeIcons){
    if(t.includes(key)) return key;
  }
  return null;
}

// Notícias de teste
function noticiasTeste(){
  return [
    {titulo: "Roubo no bairro Centro", data: new Date()},
    {titulo: "Acidente no bairro Jardim América", data: new Date()},
    {titulo: "Homicídio no bairro Vila Frezzarin", data: new Date()},
    {titulo: "Assalto no bairro Vila Real", data: new Date()},
    {titulo: "Acidente no bairro Desconhecido", data: new Date()}
  ];
}

// Atualiza mapa, timeline e dashboard
function atualizar(){
  markers.forEach(m=>map.removeLayer(m));
  markers = [];
  heatPoints = [];
  if(heatLayer) map.removeLayer(heatLayer);
  document.getElementById("timeline").innerHTML = "";

  const filtroTipo = document.getElementById("filtroTipo").value;

  let noticias = noticiasTeste();
  let ocorrenciasBairro = {};
  let ocorrenciasHora = {};

  noticias.forEach(n=>{
    let tipo = tipoCrime(n.titulo);
    if(!tipo) return;
    if(filtroTipo != "todos" && tipo != filtroTipo) return;

    let match = n.titulo.match(/bairro\s([\w\s]+)/i);
    let bairro = match ? match[1].trim() : "Desconhecido";
    let coords = bairrosCoords[bairro] || bairrosCoords["Desconhecido"];

    // Marcador
    let marker = L.circleMarker(coords, {
      radius: tipo=="acidente"?6:8,
      color: crimeIcons[tipo],
      fillColor: crimeIcons[tipo],
      fillOpacity:0.9,
      className: tipo=="homicídio"?"alert-marker":""
    }).addTo(map);
    marker.bindPopup("<b>"+n.titulo+"</b><br>"+n.data.toLocaleString("pt-BR"));
    markers.push(marker);

    // Heatmap
    heatPoints.push([...coords,1]);

    // Timeline
    let item = document.createElement("div");
    item.className = "timeline-item";
    item.innerHTML = n.data.toLocaleString("pt-BR")+" - "+n.titulo;
    document.getElementById("timeline").appendChild(item);

    // Dashboard
    ocorrenciasBairro[bairro] = (ocorrenciasBairro[bairro]||0)+1;
    let hora = n.data.getHours();
    ocorrenciasHora[hora] = (ocorrenciasHora[hora]||0)+1;

    // Alerta sonoro para homicídio
    if(tipo=="homicídio"){
      new Audio("https://www.soundjay.com/buttons/sounds/beep-07.mp3").play();
    }
  });

  // Heatmap
  heatLayer = L.heatLayer(heatPoints, {radius:25, blur:15, maxZoom:17}).addTo(map);

  atualizarDashboard(ocorrenciasBairro, ocorrenciasHora);
}

// Atualiza gráficos
let chartBairro, chartHora;
function atualizarDashboard(ocorrenciasBairro, ocorrenciasHora){
  const ctxB = document.getElementById("chartBairro").getContext("2d");
  const ctxH = document.getElementById("chartHora").getContext("2d");

  if(chartBairro) chartBairro.destroy();
  chartBairro = new Chart(ctxB,{
    type:'bar',
    data:{
      labels:Object.keys(ocorrenciasBairro),
      datasets:[{
        label:'Ocorrências por bairro',
        data:Object.values(ocorrenciasBairro),
        backgroundColor:'rgba(255,99,132,0.6)'
      }]
    },
    options:{ responsive:true, plugins:{ legend:{ display:false } } }
  });

  if(chartHora) chartHora.destroy();
  chartHora = new Chart(ctxH,{
    type:'line',
    data:{
      labels:Array.from({length:24},(_,i)=>i+":00"),
      datasets:[{
        label:'Ocorrências por hora',
        data:Array.from({length:24},(_,i)=>ocorrenciasHora[i]||0),
        borderColor:'rgba(0,255,200,0.8)',
        backgroundColor:'rgba(0,255,200,0.2)',
        fill:true,
        tension:0.3
      }]
    },
    options:{ responsive:true, plugins:{ legend:{ display:false } } }
  });
}

// Atualiza cada 5 minutos
setInterval(atualizar,300000);
document.getElementById("filtroTipo").addEventListener("change", atualizar);
atualizar();
</script>
</body>
</html>
