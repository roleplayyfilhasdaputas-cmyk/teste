<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Radar de Ocorrências - Franca SP</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
}

#map{
height:85vh;
}

#painel{
height:15vh;
background:#222;
overflow:auto;
padding:10px;
}

#ranking{
margin-top:10px;
}

</style>
</head>

<body>

<h2 style="padding:10px">Radar de Ocorrências - Franca (últimas 24h)</h2>

<div id="map"></div>

<div id="painel">

<b>Ocorrências:</b>
<div id="lista"></div>

<div id="ranking">
<b>Ranking de bairros (notícias):</b>
<div id="rankingLista"></div>
</div>

</div>

<script>

var map = L.map('map').setView([-20.539,-47.401],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

var cluster = L.markerClusterGroup()

map.addLayer(cluster)

var bairrosRanking = {}

const feeds=[

"https://g1.globo.com/rss/sp/franca-jacarei/index.xml",
"https://acidadeon.com/franca/rss",
"https://g1.globo.com/rss/sp/cn/index.xml"

]

const bairrosFranca=[

"Centro",
"Jardim Planalto",
"Jardim Paulista",
"Vila Santa Cruz",
"Vila Santa Clara",
"Jardim Aeroporto",
"Jardim Redentor",
"Parque do Horto",
"Jardim Lima",
"Jardim Noêmia",
"Vila Raycos",
"Jardim Cambuí",
"Residencial Amazonas",
"City Petrópolis",
"Vila Industrial",
"Parque Vicente Leporace",
"Jardim Petraglia",
"Jardim Paineiras",
"Jardim Francano",
"Santa Terezinha"

]

function detectarTipo(t){

t=t.toLowerCase()

if(t.includes("acidente")) return "acidente"

if(t.includes("roubo")||t.includes("assalto")) return "roubo"

if(t.includes("assassinato")||t.includes("homicídio")) return "assassinato"

return null

}

function extrairLocal(texto){

let rua=texto.match(/(Rua|Avenida|Av|Praça|Travessa) [\w\s]+/i)

if(rua) return rua[0]

for(let b of bairrosFranca){

if(texto.includes(b)) return b

}

return null

}

async function geocode(local){

let url="https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(local+", Franca SP")

let res=await fetch(url)

let data=await res.json()

if(data.length>0){

return{

lat:parseFloat(data[0].lat),
lon:parseFloat(data[0].lon)

}

}

return null

}

async function pegarNoticias(){

const proxy="https://api.allorigins.win/get?url="

let noticias=[]

let agora=new Date()

for(let feed of feeds){

try{

let res=await fetch(proxy+encodeURIComponent(feed))

let data=await res.json()

let xml=new DOMParser().parseFromString(data.contents,"text/xml")

let items=xml.querySelectorAll("item")

items.forEach(item=>{

let titulo=item.querySelector("title").textContent

let pub=new Date(item.querySelector("pubDate").textContent)

let diff=(agora-pub)/(1000*60*60)

if(diff<=24){

noticias.push({

titulo:titulo,
data:pub

})

}

})

}catch(e){}

}

return noticias

}

function corTipo(tipo){

if(tipo=="acidente") return "yellow"

if(tipo=="roubo") return "red"

if(tipo=="assassinato") return "black"

}

function atualizarRanking(){

let html=""

let ordenado=Object.entries(bairrosRanking)

ordenado.sort((a,b)=>b[1]-a[1])

ordenado.forEach(i=>{

html+=i[0]+" : "+i[1]+"<br>"

})

document.getElementById("rankingLista").innerHTML=html

}

async function atualizar(){

cluster.clearLayers()

document.getElementById("lista").innerHTML=""

bairrosRanking={}

let noticias=await pegarNoticias()

for(let n of noticias){

let tipo=detectarTipo(n.titulo)

if(!tipo) continue

let local=extrairLocal(n.titulo)

if(!local) continue

let coord=await geocode(local)

if(!coord) continue

let cor=corTipo(tipo)

let marker=L.circleMarker([coord.lat,coord.lon],{

radius:7,
color:cor,
fillColor:cor,
fillOpacity:0.8

})

let hora=n.data.toLocaleString("pt-BR")

marker.bindPopup(

"<b>"+n.titulo+"</b><br>"+
"Tipo: "+tipo+"<br>"+
"Publicado: "+hora

)

cluster.addLayer(marker)

document.getElementById("lista").innerHTML+=

n.titulo+" ("+hora+")<br>"

if(!bairrosRanking[local]){

bairrosRanking[local]=0

}

bairrosRanking[local]++

}

atualizarRanking()

}

setInterval(atualizar,5000)

atualizar()

</script>

</body>
</html>
