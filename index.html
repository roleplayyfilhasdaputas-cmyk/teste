<!DOCTYPE html>
<html>

<head>

<title>Monitor Franca</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

#map{
height:75vh;
}

#painel{
padding:10px;
background:#222;
}

</style>

</head>

<body>

<h2 style="padding:10px">
Monitoramento Franca SP
</h2>

<div id="map"></div>

<div id="painel">

<div>🌧️ clima: <span id="clima">carregando...</span></div>

<div>✈️ aeronaves detectadas: <span id="air">0</span></div>

<div>🚁 helicópteros estimados: <span id="heli">0</span></div>

<div>🚨 alerta IA: <span id="alerta">normal</span></div>

</div>

<script>

// MAPA

var map = L.map('map').setView([-20.539,-47.401],13)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)


// marcador da cidade

L.marker([-20.539,-47.401])
.addTo(map)
.bindPopup("Franca SP")


// grupo de aeronaves

var camadaAeronaves = L.layerGroup().addTo(map)

var total=0
var helic=0


// CLIMA

function clima(){

fetch(
"https://api.openweathermap.org/data/2.5/weather?q=Franca,BR&appid=SUAKEY&units=metric"
)

.then(r=>r.json())

.then(d=>{

var temp=d.main.temp
var desc=d.weather[0].description

document.getElementById("clima").innerText =
temp+"°C "+desc

})

.catch(()=>{

document.getElementById("clima").innerText =
"API clima indisponível"

})

}


// AERONAVES

function detectarAeronaves(){

fetch("https://opensky-network.org/api/states/all")

.then(r=>r.json())

.then(d=>{

camadaAeronaves.clearLayers()

total=0
helic=0

d.states.forEach(a=>{

var lat=a[6]
var lon=a[5]
var alt=a[7]

if(lat && lon){

total++

if(alt<3000) helic++

L.circleMarker([lat,lon],{
radius:4,
color:"yellow"
})
.addTo(camadaAeronaves)

}

})

document.getElementById("air").innerText=total
document.getElementById("heli").innerText=helic

analisarIA()

})

.catch(()=>{

document.getElementById("air").innerText="API bloqueada"

})

}


// IA

function analisarIA(){

var alerta="normal"

if(helic>5) alerta="atividade aérea incomum"

if(total>50) alerta="tráfego aéreo alto"

document.getElementById("alerta").innerText=alerta

}


// iniciar

clima()

detectarAeronaves()

setInterval(detectarAeronaves,20000)

</script>

</body>
</html>
