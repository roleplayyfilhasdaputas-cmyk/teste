<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa Avançado de Ocorrências - Franca SP</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<style>
body { margin:0; font-family:Arial, sans-serif; background:#111; color:white; }
#map { height:90vh; }
#painel { height:10vh; padding:10px; background:#222; overflow-x:auto; white-space:nowrap; }
.ocorrencia { display:inline-block; margin-right:20px; }
</style>
</head>
<body>

<h2 style="padding:10px">Mapa de Ocorrências - Franca SP (últimas 24h)</h2>

<div id="map"></div>
<div id="painel"><span class="ocorrencia">Carregando notícias...</span></div>

<script>
// 1️⃣ Mapa
var map = L.map('map').setView([-20.539, -47.401], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 2️⃣ Camadas
var camadaCluster = L.markerClusterGroup();
var camadaNoticias = L.layerGroup();
var heatLayer = L.heatLayer([], {radius: 25, blur: 15, maxZoom: 17}).addTo(map);

map.addLayer(camadaCluster);

// 3️⃣ Adicionar notícia
function adicionarNoticia(lat, lon, titulo, horario, tipo){
  let cor = "gray";
  if(tipo==="acidente") cor = "yellow";
  if(tipo==="roubo") cor = "red";
  if(tipo==="assassinato") cor = "black";

  var marcador = L.circleMarker([lat, lon], {
    radius:6,
    color: cor,
    fillColor: cor,
    fillOpacity:0.8
  });
  marcador.bindPopup(`<b>${tipo.toUpperCase()}</b><br>${titulo}<br>${horario}`);
  camadaCluster.addLayer(marcador);

  // Adiciona no heatmap (peso 1 por ocorrência)
  heatLayer.addLatLng([lat, lon, 1]);

  // Painel
  var painel = document.getElementById("painel");
  var span = document.createElement("span");
  span.className = "ocorrencia";
  span.innerHTML = `<b>${tipo.toUpperCase()}</b>: ${titulo} (${horario})`;
  painel.appendChild(span);
}

// 4️⃣ Feeds RSS
const feeds = [
  "https://g1.globo.com/rss/sp/franca-jacarei/index.xml",
  "https://acidadeon.com/franca/rss"
];

// 5️⃣ Pegar notícias
async function pegarNoticiasRSS(){
  const proxy = "https://api.allorigins.win/get?url=";
  let noticias24h = [];
  const agora = new Date();

  for(const rssURL of feeds){
    try {
      const res = await fetch(proxy + encodeURIComponent(rssURL));
      const data = await res.json();
      const parser = new DOMParser();
      const xml = parser.parseFromString(data.contents, "application/xml");
      const items = xml.querySelectorAll("item");

      items.forEach(item => {
        const titulo = item.querySelector("title").textContent;
        const pubDate = new Date(item.querySelector("pubDate").textContent);
        if ((agora - pubDate)/(1000*60*60) <= 24) {
          noticias24h.push({titulo, pubDate});
        }
      });
    } catch(e){
      console.error("Erro RSS:", rssURL, e);
    }
  }
  return noticias24h;
}

// 6️⃣ Geocoding Nominatim
async function geocodeEndereco(endereco){
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco + ", Franca, SP")}`;
    const res = await fetch(url);
    const data = await res.json();
    if(data && data.length > 0){
      return {lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon)};
    }
  } catch(e){
    console.error("Erro geocoding:", e);
  }
  return null;
}

// 7️⃣ Detectar tipo
function detectarTipo(titulo){
  titulo = titulo.toLowerCase();
  if(titulo.includes("acidente")) return "acidente";
  if(titulo.includes("roubo")) return "roubo";
  if(titulo.includes("assassinato") || titulo.includes("homicídio")) return "assassinato";
  return "outro";
}

// 8️⃣ Extrair endereço
function extrairEndereco(titulo){
  let match = titulo.match(/(Rua|Avenida|Av|Praça|Travessa|Alameda) [\w\s]+/i);
  return match ? match[0] : null;
}

// 9️⃣ Atualizar mapa
async function atualizarMapa(){
  camadaCluster.clearLayers();
  camadaNoticias.clearLayers();
  heatLayer.setLatLngs([]);
  document.getElementById("painel").innerHTML = "";

  const noticias = await pegarNoticiasRSS();
  if(noticias.length === 0){
    document.getElementById("painel").innerHTML = "<span class='ocorrencia'>Nenhuma notícia nas últimas 24h</span>";
    return;
  }

  for(const n of noticias){
    let endereco = extrairEndereco(n.titulo);
    if(!endereco) continue;

    let coords = await geocodeEndereco(endereco);
    if(!coords) continue;

    let tipo = detectarTipo(n.titulo);
    if(tipo==="outro") continue;

    adicionarNoticia(coords.lat, coords.lon, n.titulo, n.pubDate.toLocaleString(), tipo);
  }
}

//  🔄 Atualiza a cada 5 minutos
setInterval(atualizarMapa, 300000);

//  🔥 Carrega imediatamente
atualizarMapa();
</script>
</body>
</html>
