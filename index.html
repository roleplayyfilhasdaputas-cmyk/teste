<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Centro de Comando Militar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
background:#050b10;
color:white;
font-family:Arial;
}

header{
background:#0f1419;
padding:15px;
font-size:24px;
border-bottom:2px solid red;
}

#map{
height:90vh;
}

.painel{
position:absolute;
top:80px;
left:10px;
background:#111;
padding:15px;
width:230px;
border:1px solid red;
}

.alerta{
color:red;
font-weight:bold;
animation:piscando 1s infinite;
}

@keyframes piscando{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

.radar{
position:absolute;
bottom:20px;
right:20px;
width:120px;
height:120px;
border:2px solid lime;
border-radius:50%;
}

.radar::after{
content:"";
position:absolute;
width:2px;
height:60px;
background:lime;
top:0;
left:50%;
transform-origin:bottom;
animation:radar 2s linear infinite;
}

@keyframes radar{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

</style>
</head>

<body>

<header>
🌍 CENTRO DE COMANDO GLOBAL
</header>

<div id="map"></div>

<div class="painel">

<h3>🔴 Alertas Globais</h3>

<div class="alerta">Guerra Ucrânia</div>
<div class="alerta">Conflito Gaza</div>
<div class="alerta">Síria</div>
<div class="alerta">Mar do Sul da China</div>
<div class="alerta">Coreia do Norte</div>

</div>

<div class="radar"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:6
}).addTo(map);



function addBase(lista,cor){

lista.forEach(function(b){

L.circleMarker([b[0],b[1]],{
color:cor,
radius:6
}).addTo(map).bindPopup(b[2]);

});

}



// bases aereas

addBase([

[38.87,-77.06,"✈ Base Aérea EUA"],
[51.47,-0.45,"✈ Base RAF UK"],
[35.55,139.78,"✈ Base Japão"],
[48.35,11.79,"✈ Base Alemanha"],
[31.95,35.93,"✈ Base Jordânia"]

],"cyan");



// bases navais

addBase([

[36.97,-76.33,"⚓ Base Naval Norfolk"],
[34.70,135.20,"⚓ Base Naval Japão"],
[31.23,121.47,"⚓ Base Naval China"],
[24.48,54.37,"⚓ Base Naval Emirados"]

],"blue");



// bases do exercito

addBase([

[33.92,-117.88,"🪖 Base Exército EUA"],
[55.75,37.61,"🪖 Base Rússia"],
[39.90,116.40,"🪖 Base China"]

],"green");



// nucleares

addBase([

[40.18,44.51,"☢ Base Nuclear Rússia"],
[34.73,-86.58,"☢ Base Nuclear EUA"],
[31.90,35.20,"☢ Base Nuclear Israel"]

],"yellow");



// satelites

addBase([

[0,-30,"🛰 Satélite Militar"],
[10,60,"🛰 Satélite Espião"],
[-5,120,"🛰 Satélite Militar"]

],"white");



// porta avioes

addBase([

[20,-150,"🚢 Porta Aviões EUA"],
[15,130,"🚢 Porta Aviões China"],
[10,60,"🚢 Porta Aviões Índia"]

],"purple");



// submarinos

addBase([

[-10,-40,"🤿 Submarino Nuclear"],
[25,150,"🤿 Submarino Militar"],
[5,80,"🤿 Submarino Rússia"]

],"orange");



// conflitos

addBase([

[49,31,"🔴 Guerra Ucrânia"],
[31,34,"🔴 Gaza"],
[35,38,"🔴 Síria"],
[15,115,"🔴 Mar da China"],
[39,127,"🔴 Coreia"]

],"red");

</script>

</body>
</html>
