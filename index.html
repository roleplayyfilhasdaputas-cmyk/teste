<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Franca SP - Ocorrências Policiais IA</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
  body { margin:0; font-family:Arial; background:#111; color:white; }
  #map { height:100vh; }
</style>
</head>
<body>
<h2 style="padding:10px">Monitoramento Ocorrências Policiais - Franca SP</h2>
<div id="map"></div>

<script>
// === MAPA ===
var map = L.map('map').setView([-20.539,-47.401],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Camadas
var camadaOcorrencias = L.layerGroup().addTo(map);
var camadaAlertasIA = L.layerGroup().addTo(map);

// === ÍCONE REALISTA DE OCORRÊNCIA POLICIAL ===
var iconePolicial = L.icon({
  iconUrl: 'https://upload.wikimedia.org/wikipedia/commons/3/33/Red_circle_icon.svg', // vermelho realista
  iconSize: [25,25]
});

// === SIMULAÇÃO DE OCORRÊNCIAS POLICIAIS ===
var ocorrencias = [];
function gerarOcorrencias(){
  camadaOcorrencias.clearLayers();
  ocorrencias = [];
  for(let i=0;i<10;i++){
    let lat = -20.539 + (Math.random()-0.5)*0.05;
    let lon = -47.401 + (Math.random()-0.5)*0.05;
    ocorrencias.push({lat, lon});
    L.marker([lat,lon], {icon: iconePolicial})
      .addTo(camadaOcorrencias)
      .bindPopup("Ocorrência policial");
  }
}

// === 9 IAs DETECTANDO OCORRÊNCIAS POLICIAIS ===
function atualizarAlertasIA(){
  camadaAlertasIA.clearLayers();
  for(let i=1;i<=9;i++){
    // IA escolhe aleatoriamente uma ocorrência
    let occ = ocorrencias[Math.floor(Math.random()*ocorrencias.length)];
    if(occ){
      let lat = occ.lat + (Math.random()-0.5)*0.001; // leve variação
      let lon = occ.lon + (Math.random()-0.5)*0.001;
      L.marker([lat,lon], {icon: iconePolicial})
        .addTo(camadaAlertasIA)
        .bindPopup(`IA policial ${i} detectou ocorrência!`);
    }
  }
}

// === LOOP DE ATUALIZAÇÃO ===
gerarOcorrencias();
atualizarAlertasIA();

setInterval(gerarOcorrencias,15000);     // atualiza ocorrências
setInterval(atualizarAlertasIA,5000);   // atualiza detecção das IAs
</script>

</body>
</html>
