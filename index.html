<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Radar de Ocorrências Franca – Final PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }
#map { height:50vh; }
#painel { height:50vh; background:#222; overflow:auto; padding:10px; display:flex; flex-direction:row; }
#timeline { flex:1; overflow:auto; padding-right:10px; }
#dashboard { flex:1; padding-left:10px; }
.timeline-item { margin-bottom:5px; }
.alert-marker { animation: pulse 1s infinite; }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
.controls { margin-bottom:10px; }
</style>
</head>

<body>
<h2 style="padding:10px">Radar de Ocorrências – Franca FINAL PRO</h2>

<div class="controls">
  Tipo de Crime:
  <select id="filtroTipo">
    <option value="todos">Todos</option>
    <option value="acidente">Acidente</option>
    <option value="roubo">Roubo/Assalto</option>
    <option value="homicídio">Homicídio/Assassinato</option>
  </select>
</div>

<div id="map"></div>
<div id="painel">
  <div id="timeline"></div>
  <div id="dashboard">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
// --- Inicializa mapa ---
const map = L.map('map').setView([-20.538, -47.401],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// --- Feeds RSS ---
const feeds = [
"https://g1.globo.com/sp/franca-jacarei/rss.xml",
"https://acidadeon.com/franca/rss"
];

// --- Tipos de crime ---
const crimeIcons = {
  "acidente": "yellow",
  "roubo": "red",
  "assalto": "red",
  "homicídio": "black",
  "assassinato": "black",
  "latrocínio": "black"
};

// --- Coordenadas aproximadas de bairros ---
const bairrosCoords = {
  "Centro": [-20.538, -47.400],
  "Jardim América": [-20.540, -47.402],
  "Vila Frezzarin": [-20.534, -47.405],
  "Vila Real": [-20.535, -47.399],
  "Desconhecido": [-20.538, -47.401]
};

// --- Marcadores e heatmap ---
let markers = [];
let heatPoints = [];
let heatLayer;

// --- Detecta tipo de crime ---
function tipoCrime(t){
  t = t.toLowerCase();
  for(let key in crimeIcons){
    if(t.includes(key)) return key;
  }
  return null;
}

// --- Busca RSS ---
async function rss(){
  const proxy = "https://api.allorigins.win/get?url=";
  let lista = [];
  let agora = new Date();
  for(let f of feeds){
    try{
      let r = await fetch(proxy + encodeURIComponent(f));
      let j = await r.json();
      let xml = new DOMParser().parseFromString(j.contents,"text/xml");
      let items = xml.querySelectorAll("item");
      items.forEach(i=>{
        let titulo = i.querySelector("title").textContent;
        let data = new Date(i.querySelector("pubDate").textContent);
        let horas = (agora - data)/(1000*60*60);
        if(horas <= 24){
          lista.push({titulo, data});
        }
      });
    }catch(e){ console.warn("Erro feed:", f, e); }
  }
  lista.sort((a,b)=>b.data - a.data);
  return lista.slice(0,100);
}

// --- Atualiza mapa, timeline e dashboard ---
async function atualizar(){
  markers.forEach(m=>map.removeLayer(m));
  markers = [];
  heatPoints = [];
  if(heatLayer) map.removeLayer(heatLayer);
  document.getElementById("timeline").innerHTML = "";

  const filtroTipo = document.getElementById("filtroTipo").value;

  let noticias = await rss();
  let ocorrenciasBairro = {};

  for(let n of noticias){
    let tipo = tipoCrime(n.titulo);
    if(!tipo) continue;
    if(filtroTipo!="todos" && tipo!=filtroTipo) continue;

    let match = n.titulo.match(/bairro\s([\w\s]+)/i);
    let bairro = match ? match[1].trim() : "Desconhecido";
    let coords = bairrosCoords[bairro] || bairrosCoords["Desconhecido"];

    // Cria marcador
    let marker = L.circleMarker(coords, {
      radius: tipo=="acidente"?6:8,
      color: crimeIcons[tipo],
      fillColor: crimeIcons[tipo],
      fillOpacity:0.9,
      className: tipo=="homicídio"||tipo=="assassinato"?"alert-marker":""
    }).addTo(map);
    marker.bindPopup("<b>"+n.titulo+"</b><br>"+n.data.toLocaleString("pt-BR"));
    markers.push(marker);

    // Adiciona ao heatmap
    heatPoints.push([...coords, 1]);

    // Timeline
    let item = document.createElement("div");
    item.className = "timeline-item";
    item.innerHTML = n.data.toLocaleString("pt-BR")+" - "+n.titulo;
    document.getElementById("timeline").appendChild(item);

    // Dashboard
    ocorrenciasBairro[bairro] = (ocorrenciasBairro[bairro]||0)+1;

    // Alerta sonoro
    if(tipo=="homicídio"||tipo=="assassinato"){
      new Audio("https://www.soundjay.com/buttons/sounds/beep-07.mp3").play();
    }
  }

  // Cria heatmap
  heatLayer = L.heatLayer(heatPoints, {radius:25, blur:15, maxZoom:17}).addTo(map);

  // Atualiza gráfico
  atualizarDashboard(ocorrenciasBairro);
}

// --- Atualiza gráfico ---
let chart;
function atualizarDashboard(ocorrenciasBairro){
  const ctx = document.getElementById("chart").getContext("2d");
  if(chart) chart.destroy();
  chart = new Chart(ctx,{
    type:'bar',
    data:{
      labels:Object.keys(ocorrenciasBairro),
      datasets:[{
        label:'Ocorrências por bairro',
        data:Object.values(ocorrenciasBairro),
        backgroundColor:'rgba(255,99,132,0.6)'
      }]
    },
    options:{ responsive:true, plugins:{ legend:{ display:false } } }
  });
}

// --- Atualiza a cada 5 minutos ---
setInterval(atualizar,300000);
document.getElementById("filtroTipo").addEventListener("change", atualizar);
atualizar();
</script>
</body>
</html>
