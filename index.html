<!DOCTYPE html> <html lang="pt-BR"> <head> <meta charset="UTF-8"> <title>Radar Aéreo - Franca</title> <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/> <style> body{ margin:0; font-family:Arial; background:#0b0f1a; color:white; } #topbar{ background:#111827; padding:12px; font-size:18px; font-weight:bold; } #container{ display:flex; height:92vh; } #map{ flex:3; } #painel{ flex:1; background:#0f172a; padding:15px; overflow:auto; border-left:2px solid #1f2937; } .alerta{ background:#ff2a2a; padding:10px; margin-bottom:10px; display:none; font-weight:bold; } .card{ background:#1f2937; padding:10px; margin-bottom:10px; border-radius:6px; } </style> </head> <body> <div id="topbar"> 🚁 Radar Aéreo - Monitoramento Franca </div> <div id="container"> <div id="map"></div> <div id="painel"> <div id="alerta" class="alerta"> ⚠ Helicóptero ou aeronave na área! </div> <h3>Aeronaves detectadas</h3> <div id="lista"></div> </div> </div> <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> <script> var centro = { lat:-20.5386, lon:-47.4000 }; var raio = 3; var map = L.map('map').setView([centro.lat,centro.lon],12); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{ maxZoom:19 }).addTo(map); L.circle([centro.lat,centro.lon],{ radius:raio*1000, color:"red", fill:false }).addTo(map); var trilhas={}; function distancia(lat1,lon1,lat2,lon2){ var R=6371; var dLat=(lat2-lat1)*Math.PI/180; var dLon=(lon2-lon1)*Math.PI/180; var a= Math.sin(dLat/2)*Math.sin(dLat/2)+ Math.cos(lat1*Math.PI/180)* Math.cos(lat2*Math.PI/180)* Math.sin(dLon/2)*Math.sin(dLon/2); var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); return R*c; } async function atualizar(){ let r = await fetch("https://opensky-network.org/api/states/all"); let data = await r.json(); document.getElementById("lista").innerHTML=""; data.states.forEach(a=>{ let id=a[0]; let callsign=a[1]; let lon=a[5]; let lat=a[6]; let alt=a[7]; let vel=a[9]; if(!lat || !lon) return; let dist = distancia(centro.lat,centro.lon,lat,lon); if(dist < raio){ L.marker([lat,lon]).addTo(map) .bindPopup("Aeronave: "+callsign); document.getElementById("alerta").style.display="block"; if(!trilhas[id]) trilhas[id]=[]; trilhas[id].push([lat,lon]); L.polyline(trilhas[id]).addTo(map); let card = ` <div class="card"> <b>${callsign}</b><br> Altitude: ${alt} m<br> Velocidade: ${vel} m/s </div> `; document.getElementById("lista").innerHTML+=card; } }); } atualizar(); setInterval(atualizar,20000); </script> </body> </html>
