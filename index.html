<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal do Biel</title>

<script src="https://unpkg.com/globe.gl"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
}

header{
background:#c4170c;
padding:18px;
font-size:26px;
font-weight:bold;
}

nav{
background:#111;
padding:12px;
display:flex;
gap:20px;
flex-wrap:wrap;
border-bottom:1px solid #222;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

nav a:hover{
color:#ff4444;
}

#conteudo{
height:90vh;
}

iframe{
width:100%;
height:100%;
border:none;
}

.feed{
padding:20px;
}

.item{
margin-bottom:15px;
border-left:3px solid red;
padding-left:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
height:100%;
}

#globo{
width:100%;
height:100%;
}

</style>

</head>

<body>

<header>
🌍 PORTAL DO BIEL
</header>

<nav>

<a onclick="globo()">🌍 Globo 3D</a>

<a onclick="radar()">✈️ Aviões</a>

<a onclick="navios()">🚢 Navios</a>

<a onclick="sat()">🛰 Satélites</a>

<a onclick="conflitos()">🌍 Conflitos</a>

<a onclick="comando()">🧭 Centro de Comando</a>

<a onclick="foguetes()">🚀 Lançamentos</a>

<a onclick="noticias()">📰 Notícias</a>

</nav>

<div id="conteudo">

<div class="feed">
<h2>Painel Global</h2>
<p>Escolha uma ferramenta acima.</p>
</div>

</div>

<script>

function globo(){

document.getElementById("conteudo").innerHTML=`<div id="globo"></div>`;

const world = Globe()
(document.getElementById('globo'))

.globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')

.backgroundColor('#000')

}

function radar(){

document.getElementById("conteudo").innerHTML=
`<iframe src="https://globe.adsbexchange.com/"></iframe>`;

}

function navios(){

document.getElementById("conteudo").innerHTML=
`<iframe src="https://www.marinetraffic.com/en/ais/embed"></iframe>`;

}

function sat(){

document.getElementById("conteudo").innerHTML=
`<iframe src="https://satellitemap.space/"></iframe>`;

}

function conflitos(){

document.getElementById("conteudo").innerHTML=
`<iframe src="https://liveuamap.com/"></iframe>`;

}

function comando(){

document.getElementById("conteudo").innerHTML=

`<div class="grid">

<iframe src="https://globe.adsbexchange.com/"></iframe>

<iframe src="https://satellitemap.space/"></iframe>

<iframe src="https://www.marinetraffic.com/en/ais/embed"></iframe>

<iframe src="https://liveuamap.com/"></iframe>

</div>`;

}

async function foguetes(){

let res = await fetch("https://ll.thespacedevs.com/2.2.0/launch/upcoming/?limit=5");

let data = await res.json();

let html="<div class='feed'><h2>🚀 Lançamentos Espaciais</h2>";

data.results.forEach(l => {

html += `
<div class="item">
🚀 ${l.name}<br>
📅 ${l.net}
</div>
`;

});

html+="</div>";

document.getElementById("conteudo").innerHTML=html;

}

async function noticias(){

let url="https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=pt-BR&gl=BR&ceid=BR:pt";

let res=await fetch(url);

let data=await res.json();

let html="<div class='feed'><h2>📰 Notícias</h2>";

data.items.slice(0,15).forEach(n => {

html+=`
<div class="item">
<b>${n.title}</b><br>
<a href="${n.link}" target="_blank" style="color:#ff4444">Abrir notícia</a>
</div>
`;

});

html+="</div>";

document.getElementById("conteudo").innerHTML=html;

}

</script>

</body>
</html>
