<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Radar de Ocorrências Franca - Versão Avançada</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }
#map { height:75vh; }
#painel { height:25vh; background:#222; overflow:auto; padding:10px; }
.timeline-item { margin-bottom:5px; }
</style>
</head>

<body>

<h2 style="padding:10px">Radar de Ocorrências – Franca</h2>

<div id="map"></div>

<div id="painel">
<h3>Ocorrências últimas 24h</h3>
<div id="timeline"></div>
</div>

<script>

// --- Inicializa mapa ---
const map = L.map('map').setView([-20.538,-47.401],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
  .addTo(map);

// --- Feeds RSS focados em segurança ---
const feeds = [
"https://g1.globo.com/sp/franca-jacarei/rss.xml",
"https://g1.globo.com/sp/ribeirao-preto-franca/rss.xml",
"https://acidadeon.com/franca/rss",
"https://www.diariodaregiao.com.br/rss/seguranca",
"https://www.folhadaregiao.com.br/rss/policia",
"https://www.ribeiraopretoonline.com.br/rss/seguranca",
"https://www.jornalacidade.com.br/rss/policia",
"https://www.estadao.com.br/rss/policia",
"https://www.gazetadopovo.com.br/rss/seguranca",
"https://www.band.uol.com.br/rss/cidades",
"https://www.cnnbrasil.com.br/rss/brasil",
"https://www.r7.com/rss/cidades",
"https://www.uol.com.br/rss/noticias",
"https://www.terra.com.br/rss/brasil",
"https://www.ig.com.br/noticias/rss/seguranca",
"https://www.jornaldebrasilia.com.br/rss/policia",
"https://www.odiario.com.br/rss/seguranca",
"https://www.jornaldeuberaba.com.br/rss/policia",
"https://www.diariodopara.com.br/rss/seguranca",
"https://www.jornalmaringa.com.br/rss/seguranca"
];

// --- Função para determinar tipo de crime ---
function tipoCrime(t){
  t = t.toLowerCase();
  if(t.includes("acidente")) return "yellow";
  if(t.includes("roubo") || t.includes("assalto")) return "red";
  if(t.includes("homicídio") || t.includes("assassinato") || t.includes("latrocínio")) return "black";
  return null;
}

// --- Marcadores atuais ---
let markers = [];

// --- Função para buscar RSS ---
async function rss(){
  const proxy = "https://api.allorigins.win/get?url=";
  let lista = [];
  let agora = new Date();

  for(let f of feeds){
    try{
      let r = await fetch(proxy + encodeURIComponent(f));
      let j = await r.json();
      let xml = new DOMParser().parseFromString(j.contents,"text/xml");
      let items = xml.querySelectorAll("item");

      items.forEach(i=>{
        let titulo = i.querySelector("title").textContent;
        let data = new Date(i.querySelector("pubDate").textContent);
        let horas = (agora - data)/(1000*60*60);
        if(horas <= 24){
          lista.push({titulo, data});
        }
      });
    }catch(e){ console.warn("Erro no feed:", f, e); }
  }

  // Ordena por data decrescente
  lista.sort((a,b) => b.data - a.data);
  return lista.slice(0,100); // Limita a 100 ocorrências
}

// --- Função para geocoding (Nominatim) ---
async function geocode(text){
  const url = "https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(text + ", Franca, SP");
  try{
    let r = await fetch(url);
    let j = await r.json();
    if(j && j.length>0){
      return [parseFloat(j[0].lat), parseFloat(j[0].lon)];
    }
  }catch(e){ console.warn("Erro geocode:", text, e); }
  return null;
}

// --- Atualiza mapa e timeline ---
async function atualizar(){
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  document.getElementById("timeline").innerHTML = "";

  let noticias = await rss();

  for(let n of noticias){
    let tipo = tipoCrime(n.titulo);
    if(!tipo) continue;

    // tenta extrair bairro ou endereço do título
    let endereco = n.titulo.split(/–|-|:/)[1] || "Franca, SP";

    let coords = await geocode(endereco);
    if(!coords){
      // fallback aleatório
      coords = [-20.538 + Math.random()*0.05, -47.401 + Math.random()*0.05];
    }

    let marker = L.circleMarker(coords, {
      radius: 8,
      color: tipo,
      fillColor: tipo,
      fillOpacity: 0.9
    }).addTo(map);

    marker.bindPopup("<b>"+n.titulo+"</b><br>"+n.data.toLocaleString("pt-BR"));
    markers.push(marker);

    let item = document.createElement("div");
    item.className = "timeline-item";
    item.innerHTML = n.data.toLocaleString("pt-BR")+" - "+n.titulo;
    document.getElementById("timeline").appendChild(item);
  }
}

// Atualiza a cada 10 minutos
setInterval(atualizar, 600000);
atualizar();

</script>

</body>
</html>
