<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Ocorrências - Franca SP</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
  body { margin:0; font-family:Arial, sans-serif; background:#111; color:white; }
  #map { height:90vh; }
  #painel { height:10vh; padding:10px; background:#222; overflow-x:auto; white-space:nowrap; }
  .ocorrencia { display:inline-block; margin-right:20px; }
</style>
</head>
<body>

<h2 style="padding:10px">Mapa de Ocorrências - Franca SP</h2>

<div id="map"></div>
<div id="painel">
  <span class="ocorrencia">Carregando ocorrências...</span>
</div>

<script>
// 1️⃣ Criar mapa
var map = L.map('map').setView([-20.539, -47.401], 13);

// 2️⃣ Tile Layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 3️⃣ Camada para ocorrências
var camadaOcorrencias = L.layerGroup().addTo(map);

// 4️⃣ Função para adicionar uma ocorrência no mapa
function adicionarOcorrencia(lat, lon, tipo, resumo, horario){
  var marcador = L.marker([lat, lon], {icon: L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png', // ícone vermelho de alerta
    iconSize: [30, 30],
    iconAnchor: [15, 30],
    popupAnchor: [0, -30]
  })}).addTo(camadaOcorrencias);

  marcador.bindPopup(`<b>${tipo}</b><br>${horario}<br>${resumo}`);

  // Adiciona no painel lateral
  var painel = document.getElementById("painel");
  var span = document.createElement("span");
  span.className = "ocorrencia";
  span.innerHTML = `<b>${tipo}</b>: ${resumo} (${horario})`;
  painel.appendChild(span);
}

// 5️⃣ Exemplo de ocorrência (substituir depois pelos dados da IA)
adicionarOcorrencia(-20.5385, -47.4020, "Assalto", "Roubo a mão armada em frente ao supermercado", "09/03/2026 08:30");
adicionarOcorrencia(-20.5400, -47.4035, "Acidente de Trânsito", "Colisão entre dois veículos na Av. Brasil", "09/03/2026 09:15");

</script>

</body>
</html>
